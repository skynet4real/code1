<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>🐔 Science Chicken - Platformer</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#000;overflow:hidden;font-family:Arial,sans-serif;touch-action:none;}
  canvas{display:block;image-rendering:pixelated;}

  #ui-overlay{
    position:fixed;top:0;left:0;width:100%;
    pointer-events:none;z-index:10;
    display:flex;justify-content:space-between;
    padding:8px 14px;
  }
  #ui-overlay>div{color:#fff;font-size:14px;text-shadow:1px 1px 3px rgba(0,0,0,0.7);}
  #score-display{color:#f1c40f;font-weight:bold;}
  #level-display{color:#74b9ff;font-size:12px;}
  #lives-display{color:#e74c3c;}

  #settings-btn,#fullscreen-btn{
    position:fixed;bottom:10px;z-index:20;
    background:rgba(255,255,255,0.15);
    border:none;color:#fff;font-size:18px;
    padding:6px 12px;border-radius:8px;
    cursor:pointer;pointer-events:all;
  }
  #settings-btn{right:50px;}
  #fullscreen-btn{right:10px;}
  #settings-btn:hover,#fullscreen-btn:hover{background:rgba(255,255,255,0.3);}

  #settings-panel{
    position:fixed;top:50%;left:50%;
    transform:translate(-50%,-50%);
    background:rgba(20,20,30,0.95);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:14px;
    padding:20px 28px;z-index:30;
    display:none;min-width:280px;color:#fff;
    pointer-events:all;
  }
  #settings-panel.open{display:block;}
  #settings-panel h3{margin-bottom:12px;color:#f1c40f;font-size:16px;}
  .setting-row{margin:8px 0;display:flex;align-items:center;justify-content:space-between;font-size:13px;}
  .setting-row label{flex:1;}
  .setting-row input[type=range]{width:100px;}
  .setting-row span{width:40px;text-align:right;font-size:12px;color:#74b9ff;}
  .setting-row input[type=checkbox]{width:18px;height:18px;}
  #settings-panel button{
    margin-top:10px;padding:6px 18px;
    background:#e74c3c;border:none;color:#fff;
    border-radius:6px;cursor:pointer;font-size:13px;
  }

  #title-screen{
    position:fixed;top:0;left:0;width:100%;height:100%;
    z-index:25;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    pointer-events:all;cursor:pointer;
  }

  #touch-controls{
    position:fixed;bottom:0;left:0;width:100%;
    z-index:15;display:none;pointer-events:all;
  }
  #touch-controls button{
    background:rgba(255,255,255,0.18);
    border:1px solid rgba(255,255,255,0.25);
    color:#fff;font-size:22px;border-radius:12px;
    padding:12px 18px;touch-action:manipulation;
  }
  .touch-left-group{position:fixed;bottom:15px;left:15px;display:flex;gap:8px;}
  .touch-right-group{position:fixed;bottom:15px;right:15px;display:flex;gap:8px;}
</style>
</head>

<body>
  <div id="title-screen" onclick="startGame()"></div>

  <div id="ui-overlay">
    <div id="score-display">Score: 0</div>
    <div id="level-display">Level 1</div>
    <div id="lives-display">Lives: 🥚🥚🥚</div>
  </div>

  <button id="settings-btn" onclick="toggleSettings()">⚙️</button>
  <button id="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

  <div id="settings-panel">
    <h3>⚙️ Settings</h3>
    <div class="setting-row">
      <label>Game Speed</label>
      <input type="range" min="0.4" max="2.5" step="0.1" value="1.0" id="speed-slider">
      <span id="speed-val">1.0x</span>
    </div>
    <div class="setting-row">
      <label>Move Accel</label>
      <input type="range" min="0.15" max="0.7" step="0.05" value="0.35" id="accel-slider">
      <span id="accel-val">0.35</span>
    </div>
    <div class="setting-row">
      <label>Jump Power</label>
      <input type="range" min="7" max="15" step="0.5" value="10.5" id="jump-slider">
      <span id="jump-val">10.5</span>
    </div>
    <div class="setting-row">
      <label>Max Run Speed</label>
      <input type="range" min="2.5" max="8" step="0.5" value="4.5" id="maxspd-slider">
      <span id="maxspd-val">4.5</span>
    </div>
    <div class="setting-row">
      <label>♾️ Infinite Lives</label>
      <input type="checkbox" id="inf-lives-cb">
    </div>
    <button onclick="toggleSettings()">Close</button>
  </div>

  <div id="touch-controls">
    <div class="touch-left-group">
      <button id="touch-left" ontouchstart="touchState.left=true" ontouchend="touchState.left=false">⬅️</button>
      <button id="touch-right" ontouchstart="touchState.right=true" ontouchend="touchState.right=false">➡️</button>
    </div>
    <div class="touch-right-group">
      <button id="touch-pickup" ontouchstart="touchState.pickup=true" ontouchend="touchState.pickup=false">🤏</button>
      <button id="touch-jump" ontouchstart="touchState.jump=true" ontouchend="touchState.jump=false">⬆️</button>
    </div>
  </div>

  <canvas id="game"></canvas>

<script>
(() => {
  'use strict';

  // ---------- Canvas ----------
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d', { alpha: false });
  let W = 0, H = 0;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // roundRect polyfill (older browsers)
  if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
      r = Math.max(0, Math.min(r, Math.min(w, h) / 2));
      this.beginPath();
      this.moveTo(x + r, y);
      this.arcTo(x + w, y, x + w, y + h, r);
      this.arcTo(x + w, y + h, x, y + h, r);
      this.arcTo(x, y + h, x, y, r);
      this.arcTo(x, y, x + w, y, r);
      this.closePath();
      return this;
    };
  }

  // ---------- UI cache ----------
  const ui = {
    title: document.getElementById('title-screen'),
    score: document.getElementById('score-display'),
    level: document.getElementById('level-display'),
    lives: document.getElementById('lives-display'),
    settingsPanel: document.getElementById('settings-panel'),
    touchControls: document.getElementById('touch-controls'),
    sliders: {
      speed: document.getElementById('speed-slider'),
      accel: document.getElementById('accel-slider'),
      jump: document.getElementById('jump-slider'),
      maxspd: document.getElementById('maxspd-slider')
    },
    sliderVals: {
      speed: document.getElementById('speed-val'),
      accel: document.getElementById('accel-val'),
      jump: document.getElementById('jump-val'),
      maxspd: document.getElementById('maxspd-val')
    },
    infinite: document.getElementById('inf-lives-cb')
  };

  if ('ontouchstart' in window) ui.touchControls.style.display = 'block';

  // ---------- Game state ----------
  let gameState = 'title'; // title, playing, dead, levelComplete, gameOver, win
  let currentLevel = 0;
  let score = 0;
  let lives = 3;

  const START_LIVES = 3;
  const MAX_LIVES = 9;               // cap prevents silly UI spam
  const TOTAL_LEVELS = 6;
  const GATE_NAMES = ['P1 Gate','P2 Gate','P3 Gate','P4 Gate','P5 Gate','Final Gate'];

  let gameSpeed = 1.0;
  let speedFrameAccum = 0;

  let baseAccel = 0.35, baseJumpForce = 10.5, baseMaxSpeed = 4.5;
  let infiniteLives = false;

  // ---------- Inputs ----------
  const keys = Object.create(null);
  const touchState = window.touchState = { left:false, right:false, jump:false, pickup:false };

  window.addEventListener('keydown', (e) => {
    keys[e.code] = true;

    if (e.code === 'Enter' || e.code === 'Space') {
      if (gameState === 'title') startGame();
      else if (gameState === 'gameOver' && gameOverFactTimer <= 0) restartGame();
      else if (gameState === 'win') restartGame();
    }
  });

  window.addEventListener('keyup', (e) => { keys[e.code] = false; });

  canvas.addEventListener('click', () => {
    if (gameState === 'title') startGame();
    else if (gameState === 'gameOver' && gameOverFactTimer <= 0) restartGame();
    else if (gameState === 'win') restartGame();
  });

  function isLeft()   { return keys['ArrowLeft'] || keys['KeyA'] || touchState.left; }
  function isRight()  { return keys['ArrowRight']|| keys['KeyD'] || touchState.right; }
  function isJump()   { return keys['ArrowUp']   || keys['KeyW'] || keys['Space'] || touchState.jump; }
  function isPickup() { return keys['KeyX'] || keys['ShiftLeft'] || keys['ShiftRight'] || touchState.pickup; }

  // ---------- Settings ----------
  let settingsOpen = false;

  window.toggleSettings = function toggleSettings() {
    settingsOpen = !settingsOpen;
    ui.settingsPanel.classList.toggle('open', settingsOpen);
  };

  window.toggleFullscreen = async function toggleFullscreen() {
    try {
      if (!document.fullscreenElement) await document.documentElement.requestFullscreen();
      else await document.exitFullscreen();
    } catch (_) {/* ignore */}
  };

  // slider bindings (stable, doesn’t rely on inline attributes)
  ui.sliders.speed.addEventListener('input', () => {
    gameSpeed = clamp(parseFloat(ui.sliders.speed.value), 0.4, 2.5);
    ui.sliderVals.speed.textContent = gameSpeed.toFixed(1) + 'x';
  });

  ui.sliders.accel.addEventListener('input', () => {
    baseAccel = clamp(parseFloat(ui.sliders.accel.value), 0.15, 0.7);
    ck.accel = baseAccel;
    ui.sliderVals.accel.textContent = baseAccel.toFixed(2);
  });

  ui.sliders.jump.addEventListener('input', () => {
    baseJumpForce = clamp(parseFloat(ui.sliders.jump.value), 7, 15);
    ck.jumpForce = -baseJumpForce;
    ui.sliderVals.jump.textContent = baseJumpForce.toFixed(1);
  });

  ui.sliders.maxspd.addEventListener('input', () => {
    baseMaxSpeed = clamp(parseFloat(ui.sliders.maxspd.value), 2.5, 8);
    ck.maxSpeed = baseMaxSpeed;
    ui.sliderVals.maxspd.textContent = baseMaxSpeed.toFixed(1);
  });

  ui.infinite.addEventListener('change', () => {
    infiniteLives = !!ui.infinite.checked;
  });

  // ---------- Facts ----------
  const scienceFacts = [
    "A blue whale pup drinks up to 600 litres of milk a day!",
    "Stomach acid can burn through metal!",
    "The oldest known boat is 10,000 years old!",
    "Rainbows are not really arches; they're circles.",
    "Until the 1960s, researchers thought people largely dreamed in black and white.",
    "Honey never spoils. Archaeologists found 3,000-year-old honey in Egyptian tombs — still edible!",

    "Bananas are naturally radioactive.",
    "There are more stars in the universe than grains of sand on Earth.",
    "Hot water freezes faster than cold water. It's called the Mpemba effect.",
    "Your body contains about 0.2 mg of gold.",
    "A day on Venus is longer than a year on Venus.",
    "Sharks existed before trees did.",
    "You can't hum while holding your nose. (You just tried, didn't you?)",

    "Sea otters hold hands while sleeping so they don't drift apart.",
    "The Eiffel Tower can grow up to 15 cm taller in summer due to heat expansion.",

    "Humans share about 60% of their DNA with bananas.",
    "An octopus has nine brains — one central and one in each arm.",
    "Sound travels about 4 times faster in water than in air.",
    "The shortest war in history lasted 38 minutes (Britain vs. Zanzibar, 1896).",
    "Butterflies taste with their feet.",
    "A single bolt of lightning contains enough energy to toast 100,000 slices of bread.",
    "Your stomach gets a new lining every 3 to 4 days.",
    "Astronauts grow up to 2 inches taller in space.",
    "There are more possible iterations of a game of chess than atoms in the observable universe.",
    "Sloths can hold their breath longer than dolphins — up to 40 minutes!",
    "The inventor of the Pringles can is buried in one.",
    "Tardigrades (water bears) can survive in outer space.",
    "A jiffy is an actual unit of time: 1/100th of a second.",
    "Polar bear fur is actually transparent, not white.",
    "Venus is the only planet that spins clockwise.",
    "Humans glow in the dark, but the light is 1,000 times weaker than our eyes can see.",
    "A flea can jump up to 150 times its own body length.",
    "The total weight of all ants on Earth roughly equals the total weight of all humans.",
    "Peanuts are one of the ingredients in dynamite.",
    "Your brain uses about 20% of your body's total energy.",
    "Dolphins sleep with one eye open.",
    "The average person walks the equivalent of 5 times around the Earth in a lifetime.",
    "Glaciers and ice sheets hold about 69% of the world's freshwater.",
    "A photon takes about 8 minutes to travel from the sun to Earth.",
    "Cats have over 20 vocalizations, including the purr, which vibrates at a frequency that promotes healing.",
    "The Great Wall of China is not actually visible from space with the naked eye.",
    "Platypuses glow under UV light — they're biofluorescent!",
    "There are more trees on Earth than stars in the Milky Way.",
  ];

  let gameOverFact = "";
  let gameOverFactTimer = 0;
  const FACT_DISPLAY_FRAMES = 300;

  // ---------- Player ----------
  const ck = {
    x:100, y:300, w:32, h:36, vx:0, vy:0,
    grounded:false, facing:1, state:'idle',
    animFrame:0, animTimer:0,
    invincible:0, hurtTimer:0, carrying:null,
    wingFlap:0, runPT:0,
    maxSpeed:baseMaxSpeed, accel:baseAccel,
    jumpForce:-baseJumpForce, gravity:0.55, friction:0.85,
    coyoteTime:0, jumpBufferTime:0, jumpTime:0,
    maxJumpTime:12, jumpHeld:false
  };

  // ---------- World / FX ----------
  let camera = { x:0, y:0 };
  let particles = [];
  let floatingTexts = [];
  let gateMoneyParticles = [];
  let time = 0;
  let transitionTimer = 0;
  let deathTimer = 0;
  let screenShake = 0;

  // Fall death animation state
  let fallDeathActive = false;
  let fallDeathTimer = 0;
  let fallDeathX = 0, fallDeathY = 0;
  let fallDeathParticles = [];
  let fallDeathScreamPlayed = false;

  // ---------- Background stars ----------
  const starField = [];
  for (let i=0;i<80;i++) {
    starField.push({
      x:Math.random()*2000,
      y:Math.random()*500,
      s:Math.random()*2+0.5,
      sp:Math.random()*0.5+0.2,
      bright:Math.random()
    });
  }

  // ---------- Audio ----------
  let audioCtx = null;
  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
  }

  function playSound(type) {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    const t = audioCtx.currentTime;

    switch(type) {
      case'jump':
        o.type='square';
        o.frequency.setValueAtTime(400,t);
        o.frequency.exponentialRampToValueAtTime(800,t+0.1);
        g.gain.setValueAtTime(0.08,t);
        g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
        o.start(t); o.stop(t+0.15); break;

      case'coin':
        o.type='square';
        o.frequency.setValueAtTime(988,t);
        o.frequency.setValueAtTime(1319,t+0.07);
        g.gain.setValueAtTime(0.08,t);
        g.gain.exponentialRampToValueAtTime(0.001,t+0.2);
        o.start(t); o.stop(t+0.2); break;

      case'stomp':
        o.type='sawtooth';
        o.frequency.setValueAtTime(200,t);
        o.frequency.exponentialRampToValueAtTime(80,t+0.15);
        g.gain.setValueAtTime(0.12,t);
        g.gain.exponentialRampToValueAtTime(0.001,t+0.2);
        o.start(t); o.stop(t+0.2); break;

      case'hurt':
        o.type='sawtooth';
        o.frequency.setValueAtTime(400,t);
        o.frequency.exponentialRampToValueAtTime(100,t+0.3);
        g.gain.setValueAtTime(0.12,t);
        g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
        o.start(t); o.stop(t+0.35); break;

      case'powerup':
        o.type='sine';
        [523,659,784,1047].forEach((f,i)=>o.frequency.setValueAtTime(f,t+i*0.08));
        g.gain.setValueAtTime(0.1,t);
        g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
        o.start(t); o.stop(t+0.4); break;

      case'throw':
        o.type='triangle';
        o.frequency.setValueAtTime(500,t);
        o.frequency.exponentialRampToValueAtTime(200,t+0.12);
        g.gain.setValueAtTime(0.08,t);
        g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
        o.start(t); o.stop(t+0.15); break;

      case'levelcomplete':
        o.type='square';
        [523,659,784,1047,784,1047,1319].forEach((f,i)=>o.frequency.setValueAtTime(f,t+i*0.12));
        g.gain.setValueAtTime(0.08,t);
        g.gain.exponentialRampToValueAtTime(0.001,t+1);
        o.start(t); o.stop(t+1); break;

      case'pickup':
        o.type='triangle';
        o.frequency.setValueAtTime(400,t);
        o.frequency.exponentialRampToValueAtTime(800,t+0.08);
        g.gain.setValueAtTime(0.08,t);
        g.gain.exponentialRampToValueAtTime(0.001,t+0.12);
        o.start(t); o.stop(t+0.12); break;

      case'cluck':
        o.type='sawtooth';
        o.frequency.setValueAtTime(600,t);
        o.frequency.exponentialRampToValueAtTime(300,t+0.06);
        o.frequency.exponentialRampToValueAtTime(700,t+0.1);
        o.frequency.exponentialRampToValueAtTime(200,t+0.18);
        g.gain.setValueAtTime(0.06,t);
        g.gain.exponentialRampToValueAtTime(0.001,t+0.2);
        o.start(t); o.stop(t+0.2); break;

      case'money':
        o.type='sine';
        o.frequency.setValueAtTime(1200,t);
        o.frequency.exponentialRampToValueAtTime(800,t+0.1);
        g.gain.setValueAtTime(0.05,t);
        g.gain.exponentialRampToValueAtTime(0.001,t+0.12);
        o.start(t); o.stop(t+0.12); break;

      case'chicken_scream': {
        o.type='sawtooth';
        o.frequency.setValueAtTime(800,t);
        o.frequency.exponentialRampToValueAtTime(1800,t+0.05);
        o.frequency.exponentialRampToValueAtTime(600,t+0.12);
        o.frequency.exponentialRampToValueAtTime(2000,t+0.18);
        o.frequency.exponentialRampToValueAtTime(500,t+0.25);
        o.frequency.exponentialRampToValueAtTime(1500,t+0.35);
        o.frequency.exponentialRampToValueAtTime(300,t+0.5);
        o.frequency.exponentialRampToValueAtTime(100,t+0.7);
        g.gain.setValueAtTime(0.18,t);
        g.gain.setValueAtTime(0.15,t+0.2);
        g.gain.exponentialRampToValueAtTime(0.001,t+0.7);
        o.start(t); o.stop(t+0.7);

        const o2 = audioCtx.createOscillator();
        const g2 = audioCtx.createGain();
        o2.connect(g2); g2.connect(audioCtx.destination);
        o2.type='square';
        o2.frequency.setValueAtTime(1200,t);
        o2.frequency.exponentialRampToValueAtTime(2400,t+0.08);
        o2.frequency.exponentialRampToValueAtTime(900,t+0.15);
        o2.frequency.exponentialRampToValueAtTime(2000,t+0.25);
        o2.frequency.exponentialRampToValueAtTime(400,t+0.4);
        o2.frequency.exponentialRampToValueAtTime(100,t+0.6);
        g2.gain.setValueAtTime(0.08,t);
        g2.gain.exponentialRampToValueAtTime(0.001,t+0.6);
        o2.start(t); o2.stop(t+0.6);
        break;
      }
    }
  }

  // ---------- Helpers ----------
  function clamp(v, lo, hi){ return Math.max(lo, Math.min(hi, v)); }
  function deepClone(obj){ return JSON.parse(JSON.stringify(obj)); }
  function safeNum(v, fallback){ return (Number.isFinite(v) ? v : fallback); }

  // ---------- Level data ----------
  function createLevel(index) {
    const levels = [
      {
        name:"🌿 The Ecosystem", scienceTopic:"Life Science: Food Chains & Habitats",
        bg1:'#1a3a15', bg2:'#0d1f0a', bgStyle:'forest', width:3000, height:500,
        platforms:[
          {x:0,y:468,w:800,h:32,type:'ground_grass'},
          {x:900,y:468,w:600,h:32,type:'ground_grass'},
          {x:1600,y:468,w:500,h:32,type:'ground_grass'},
          {x:2200,y:468,w:800,h:32,type:'ground_grass'},
          {x:250,y:390,w:140,h:18,type:'log'},
          {x:500,y:340,w:120,h:18,type:'leaf_plat'},

          {x:1450,y:370,w:140,h:18,type:'leaf_plat'},
          {x:1680,y:320,w:100,h:18,type:'log'},
          {x:1900,y:260,w:130,h:18,type:'leaf_plat'},
          {x:2150,y:350,w:120,h:18,type:'log'},
          {x:2400,y:290,w:140,h:18,type:'leaf_plat'},
          {x:2650,y:380,w:110,h:18,type:'log'},
          {x:820,y:250,w:70,h:14,type:'moving',moveX:80,speed:1.2},
          {x:1550,y:200,w:70,h:14,type:'moving',moveY:90,speed:1.0},
        ],
        enemies:[
          {x:400,y:440,type:'bug',patrol:130},
          {x:1000,y:440,type:'snake',patrol:100},
          {x:1500,y:440,type:'bug',patrol:110},
          {x:2000,y:440,type:'snake',patrol:90},

        ],

        powerups:[{x:510,y:300,type:'coffee_boost'},{x:1910,y:220,type:'staple_shield'}],
        pickupObjects:[
          {x:300,y:370,type:'egg',w:18,h:22},

          {x:2200,y:330,type:'egg',w:18,h:22},
        ],

      e.vx = (Math.random() > 0.5 ? 1 : -1) * 1.2;
      e.animTimer = Math.random() * 100;
      e.w = 28; e.h = 28;
      e.stunned = false; e.stunnedTimer = 0;
      e.carried = false;
    });

    // Pickups init
    lvl.pickupObjects.forEach(p => {
      p.vx = 0; p.vy = 0;
      p.grounded = false;
      p.active = true;
      p.carried = false;
    });

    // Powerups init
    lvl.powerups.forEach(p => {
      p.collected = false;
      p.bobOffset = Math.random() * Math.PI * 2;
    });

    return lvl;
  }

  let level = null;

  // ---------- Robust level/player lifecycle ----------
  function resetPlayerToSpawn() {
    ck.x = 100;
    ck.y = 300;
    ck.vx = 0; ck.vy = 0;
    ck.grounded = false;
    ck.carrying = null;
    ck.hurtTimer = 0;
    ck.invincible = 0;
    ck.state = 'idle';
    ck.coyoteTime = 0;
    ck.jumpBufferTime = 0;
    ck.jumpHeld = false;
    ck.jumpTime = 0;
    ck.maxSpeed = baseMaxSpeed;
    ck.accel = baseAccel;
    ck.jumpForce = -baseJumpForce;
  }

  function ensurePlayerIsValid() {
    // If something ever corrupts the player, fix it immediately.
    ck.x = safeNum(ck.x, 100);
    ck.y = safeNum(ck.y, 300);
    ck.vx = safeNum(ck.vx, 0);
    ck.vy = safeNum(ck.vy, 0);

    if (!level) return;

    // If player is wildly off-world (not just falling), restore.
    const outOfWorld =
      ck.x < -500 || ck.x > level.width + 500 ||
      ck.y < -1000 || ck.y > level.height + H + 1000;

    if (outOfWorld) resetPlayerToSpawn();
  }

  function loadLevel(index) {
    currentLevel = index;
    level = createLevel(index);

    camera.x = 0; camera.y = 0;
    particles = [];
    floatingTexts = [];
    transitionTimer = 90;

    // Reset fall death state ALWAYS on new level
    fallDeathActive = false;
    fallDeathTimer = 0;
    fallDeathParticles = [];
    fallDeathScreamPlayed = false;

    resetPlayerToSpawn();
    gateMoneyParticles = gateMoneyParticles || [];
  }

  function restartGame() {
    score = 0;
    lives = START_LIVES;
    currentLevel = 0;
    gateMoneyParticles = [];
    loadLevel(0);
    gameState = 'playing';
  }

  // ---------- Public startGame (called by HTML onclick) ----------
  window.startGame = function startGame() {
    initAudio();
    ui.title.style.display = 'none';
    restartGame();
  };

  // ---------- Particles/text helpers ----------
  function spawnParticles(x,y,color,count,spread,life){
    for(let i=0;i<count;i++){
      const baseLife = (life || (30 + Math.random()*20));
      particles.push({
        x,y,
        vx:(Math.random()-0.5)*spread,
        vy:(Math.random()-0.5)*spread-2,
        life:baseLife, maxLife:baseLife,
        color, size:2+Math.random()*3
      });
    }
  }

  function spawnFloatingText(x,y,text,color,big){
    floatingTexts.push({x,y,text,color,life:big?90:60,vy:big?-1.5:-2,big:!!big});
  }

  function spawnGateMoney(count){
    for(let i=0;i<count;i++){
      gateMoneyParticles.push({
        x:Math.random()*W, y:-20-Math.random()*200,
        vy:1.5+Math.random()*2, vx:(Math.random()-0.5)*0.5,
        rot:Math.random()*Math.PI*2, rotSpd:(Math.random()-0.5)*0.1,
        life:180+Math.random()*60, maxLife:180+Math.random()*60,
        size:8+Math.random()*6,
      });
    }
  }

  // ---------- Geometry ----------
  function rectCollide(a,b){
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function resolveCollision(entity, platforms){
    let grounded=false, onPlatform=null;
    for(const p of platforms){
      if(!rectCollide(entity,p)) continue;
      const ox = Math.min(entity.x+entity.w-p.x, p.x+p.w-entity.x);
      const oy = Math.min(entity.y+entity.h-p.y, p.y+p.h-entity.y);
      if (oy < ox) {
        if (entity.y + entity.h/2 < p.y + p.h/2) {
          entity.y = p.y - entity.h;
          entity.vy = 0;
          grounded = true;
          onPlatform = p;
        } else {
          entity.y = p.y + p.h;
          entity.vy = Math.max(0, entity.vy);
        }
      } else {
        if (entity.x + entity.w/2 < p.x + p.w/2) entity.x = p.x - entity.w;
        else entity.x = p.x + p.w;
        entity.vx = 0;
      }
    }
    return { grounded, onPlatform };
  }

  // ---------- Win/GameOver ----------
  function triggerGameOver(){
    gameState='gameOver';
    deathTimer=120;
    gameOverFact = scienceFacts[Math.floor(Math.random()*scienceFacts.length)];
    gameOverFactTimer = FACT_DISPLAY_FRAMES;
  }

  // ---------- Fall death animation ----------
  function spawnFallDeathFireParticles(x,y){
    const colors=['#ff4500','#ff6600','#ff8800','#ffaa00','#ffcc00','#ff2200','#cc0000'];
    for(let i=0;i<8;i++){
      fallDeathParticles.push({
        x:x+(Math.random()-0.5)*30,
        y:y+(Math.random()-0.5)*10,
        vx:(Math.random()-0.5)*4,
        vy:-Math.random()*6-2,
        life:20+Math.random()*25,
        maxLife:20+Math.random()*25,
        color:colors[Math.floor(Math.random()*colors.length)],
        size:3+Math.random()*5,
      });
    }
  }

  function chickenDie(){
    if(fallDeathActive) return;
    fallDeathActive=true;
    fallDeathTimer=0;
    fallDeathParticles=[];
    fallDeathScreamPlayed=false;

    fallDeathX = ck.x - camera.x + ck.w/2;
    fallDeathY = H - 40;

    // move player off-screen during animation
    ck.x = 100; ck.y = -100;
    ck.vx = 0; ck.vy = 0;
    screenShake = 15;
  }

  function hurtChicken(){
    if(ck.invincible>0 || ck.hurtTimer>0) return;

    ck.hurtTimer = 30;
    ck.invincible = 90;
    ck.vy = -6;
    ck.vx = -ck.facing*3;
    ck.state = 'hurt';

    if (ck.carrying){
      ck.carrying.carried=false;
      ck.carrying.vx = ck.facing*3;
      ck.carrying.vy = -5;
      ck.carrying = null;
    }

    screenShake = 10;
    playSound('hurt');
    spawnParticles(ck.x+ck.w/2, ck.y+ck.h/2, '#e74c3c', 10, 5, 20);

    if (infiniteLives) return;

    lives--;
    if (lives<=0) triggerGameOver();
  }

  // ---------- Moving platforms ----------
  function updateMovingPlatforms(){
    for(const p of level.platforms){
      if(p.type!=='moving') continue;
      const px=p.x, py=p.y;
      p.moveTimer += 0.02*(p.speed||1);
      if(p.moveX) p.x = p.origX + Math.sin(p.moveTimer)*p.moveX;
      if(p.moveY) p.y = p.origY + Math.sin(p.moveTimer)*p.moveY;
      p._dx = p.x - px;
      p._dy = p.y - py;
    }
  }

  // ---------- Coins & powerups ----------
  function updateCoins(){
    if(transitionTimer>0) return;
    for(const c of level.coins){
      if(c.collected) continue;
      if(Math.abs(ck.x+ck.w/2-c.x)<18 && Math.abs(ck.y+ck.h/2-c.y)<18){
        c.collected=true;
        score += 10;
        playSound('coin');
        spawnParticles(c.x,c.y,'#f1c40f',6,4,15);
        spawnFloatingText(c.x,c.y-10,'+10','#f1c40f');
      }
    }
  }

  function grantExtraLife(amount=1){
    if(infiniteLives) return;
    lives = clamp(lives + amount, 0, MAX_LIVES);
    spawnFloatingText(ck.x + ck.w/2, ck.y - 25, '🥚 +1 LIFE!', '#2ecc71', true);
  }

  function updatePowerups(){
    if(transitionTimer>0) return;
    for(const p of level.powerups){
      if(p.collected) continue;
      if(Math.abs(ck.x+ck.w/2-p.x)<20 && Math.abs(ck.y+ck.h/2-p.y)<20){
        p.collected = true;

        if(p.type==='coffee_boost'){
          // Coffee = boost + extra life (your request)
          grantExtraLife(1);

          ck.maxSpeed = baseMaxSpeed + 2;
          ck.jumpForce = -(baseJumpForce + 1.5);
          const restoreAt = performance.now() + 8000;
          // restore using a timestamp check (safer than stacking timeouts)
          ck._coffeeRestoreAt = restoreAt;

          spawnFloatingText(p.x,p.y-20,'☕ COFFEE BOOST!','#e67e22');
        } else {
          ck.invincible = Math.max(ck.invincible, 300);
          spawnFloatingText(p.x,p.y-20,'📎 STAPLE SHIELD!','#3498db');
        }

        score += 50;
        playSound('powerup');
        spawnParticles(p.x,p.y,'#f39c12',15,6,25);
      }
    }

    // restore coffee effect safely
    if (ck._coffeeRestoreAt && performance.now() >= ck._coffeeRestoreAt) {
      ck._coffeeRestoreAt = 0;
      ck.maxSpeed = baseMaxSpeed;
      ck.jumpForce = -baseJumpForce;
    }
  }

  // ---------- Goal ----------
  function checkGoal(){
    if(transitionTimer>0) return;
    if(rectCollide(ck, level.goal)){
      gameState='levelComplete';
      transitionTimer=180;
      playSound('levelcomplete');
      score += 500;
      spawnParticles(ck.x+ck.w/2, ck.y+ck.h/2, '#00b894', 30, 8, 40);
      spawnGateMoney(40);
    }
  }

  // ---------- Enemies / pickups physics ----------
  function updateEnemies(){
    if(transitionTimer>0) return;

    for(const e of level.enemies){
      if(!e.alive || e.carried) continue;

      if(e.stunned){
        e.stunnedTimer--;
        if(e.stunnedTimer<=0){
          e.stunned=false;
          e.vx=(Math.random()>0.5?1:-1)*1.2;
        }
        continue;
      }

      e.x += e.vx;
      if(Math.abs(e.x-e.origX) > e.patrol) e.vx *= -1;

      if (ck.invincible<=0 && ck.hurtTimer<=0 && !fallDeathActive){
        if(rectCollide(ck, {x:e.x,y:e.y,w:e.w,h:e.h})){
          if(ck.vy>0 && ck.y+ck.h-e.y<15){
            e.stunned=true;
            e.stunnedTimer=300;
            e.vx=0;
            ck.vy=-8;
            score+=100;
            playSound('stomp');
            spawnParticles(e.x+e.w/2,e.y,'#f39c12',8,4,20);
            spawnFloatingText(e.x,e.y-10,'+100','#f1c40f');
            if(level.facts && level.facts.length>0){
              spawnFloatingText(e.x,e.y-30,level.facts[Math.floor(Math.random()*level.facts.length)],'#74b9ff');
            }
            screenShake=5;
          } else {
            hurtChicken();
          }
        }
      }
    }
  }

  function updatePickupObjects(){
    for(const p of level.pickupObjects){
      if(!p.active || p.carried) continue;

      if(p.vx!==0 || !p.grounded){
        p.vy = (p.vy||0) + 0.4;
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.98;

        const res = resolveCollision(p, level.platforms);
        p.grounded = res.grounded;
        if(p.grounded){
          p.vy = 0;
          p.vx *= 0.8;
          if(Math.abs(p.vx)<0.1) p.vx=0;
        }

        if(Math.abs(p.vx)>2){
          for(const e of level.enemies){
            if(!e.alive) continue;
            if(Math.abs(p.x+p.w/2-(e.x+e.w/2))<20 && Math.abs(p.y+p.h/2-(e.y+e.h/2))<20){
              e.alive=false;
              score+=200;
              spawnParticles(e.x+e.w/2,e.y+e.h/2,'#e74c3c',12,6,25);
              spawnFloatingText(e.x,e.y-10,'+200','#f1c40f');
              playSound('stomp');
              p.vx*=0.5;
            }
          }
        }

        if(p.y > H+50) p.active=false;
      }
    }
  }

  // ---------- Camera / particles ----------
  function updateCamera(){
    const tx = ck.x - W/3;
    const ty = ck.y - H/2;
    camera.x += (tx - camera.x) * 0.08;
    camera.y += (ty - camera.y) * 0.05;
    camera.x = clamp(camera.x, 0, Math.max(0, level.width - W));
    camera.y = clamp(camera.y, -100, 0);
  }

  function updateParticles(){
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i];
      p.x+=p.vx; p.y+=p.vy;
      p.vy+=0.1;
      p.life--;
      if(p.life<=0) particles.splice(i,1);
    }
    for(let i=floatingTexts.length-1;i>=0;i--){
      const ft=floatingTexts[i];
      ft.y+=ft.vy;
      ft.life--;
      if(ft.life<=0) floatingTexts.splice(i,1);
    }
  }

  function updateGateMoney(){
    for(let i=gateMoneyParticles.length-1;i>=0;i--){
      const m=gateMoneyParticles[i];
      m.y += m.vy;
      m.x += m.vx;
      m.rot += m.rotSpd;
      m.life--;
      if(m.life<=0) gateMoneyParticles.splice(i,1);
    }
  }

  // ---------- Player update ----------
  function updateChicken(){
    if(transitionTimer>0) return;

    // Fall death animation
    if(fallDeathActive){
      fallDeathTimer++;

      if(fallDeathTimer%2===0) spawnFallDeathFireParticles(fallDeathX, fallDeathY);

      if(!fallDeathScreamPlayed){
        playSound('chicken_scream');
        fallDeathScreamPlayed = true;
      }
      if(fallDeathTimer%20===0 && fallDeathTimer<80) playSound('chicken_scream');

      for(let i=fallDeathParticles.length-1;i>=0;i--){
        const p=fallDeathParticles[i];
        p.x+=p.vx; p.y+=p.vy;
        p.vy+=0.15;
        p.life--;
        if(p.life<=0) fallDeathParticles.splice(i,1);
      }

      // End animation -> apply death
      if(fallDeathTimer>=90){
        fallDeathActive=false;
        fallDeathTimer=0;
        fallDeathParticles=[];
        fallDeathScreamPlayed=false;

        if(infiniteLives){
          resetPlayerToSpawn();
          ck.invincible = 60;
          screenShake = 10;
        } else {
          lives--;
          screenShake = 15;
          if(lives<=0) triggerGameOver();
          else { gameState='dead'; deathTimer=60; }
        }
      }
      return;
    }

    const f = ck;

    if(f.hurtTimer>0){
      f.hurtTimer--;
      if(f.hurtTimer<=0) f.state='idle';
      return;
    }

    // Movement input
    let mx = 0;
    if(isLeft()) mx=-1;
    if(isRight()) mx=1;

    if(mx!==0){
      f.vx += mx*f.accel;
      f.facing = mx;
      f.state = f.grounded ? 'run' : (f.vy<0 ? 'jump' : 'fall');
    } else {
      f.vx *= f.friction;
      if(f.grounded) f.state='idle';
    }

    f.vx = clamp(f.vx, -f.maxSpeed, f.maxSpeed);

    // Coyote / buffer
    if(f.grounded) f.coyoteTime = 6;
    else f.coyoteTime = Math.max(0, f.coyoteTime-1);

    if(isJump() && !f.jumpHeld) f.jumpBufferTime = 8;
    else f.jumpBufferTime = Math.max(0, f.jumpBufferTime-1);

    // Jump start
    if(f.jumpBufferTime>0 && f.coyoteTime>0){
      f.vy = f.jumpForce;
      f.jumpTime = f.maxJumpTime;
      f.grounded = false;
      f.coyoteTime = 0;
      f.jumpBufferTime = 0;
      f.state='jump';
      playSound('jump'); playSound('cluck');
      spawnParticles(f.x+f.w/2, f.y+f.h, '#f0a500', 4, 3, 12);
    }

    // Variable jump
    if(isJump() && f.jumpTime>0){
      f.vy = Math.min(f.vy, f.jumpForce*0.7);
      f.jumpTime--;
    } else {
      f.jumpTime = 0;
    }
    f.jumpHeld = isJump();

    // Gravity
    f.vy += f.gravity;
    f.vy = Math.min(f.vy, 12);

    // Integrate
    f.x += f.vx;
    f.y += f.vy;

    // Collisions
    const res = resolveCollision(f, level.platforms);
    f.grounded = res.grounded;

    // Ride moving platforms
    if(res.onPlatform && res.onPlatform.type==='moving'){
      f.x += res.onPlatform._dx || 0;
      f.y += res.onPlatform._dy || 0;
    }

    if(!f.grounded && f.vy>0) f.state='fall';

    // Pickup/throw
    if(isPickup()){
      if(!f.carrying){
        for(const obj of level.pickupObjects){
          if(!obj.active || obj.carried) continue;
          if(Math.abs(f.x+f.w/2-(obj.x+obj.w/2))<30 && Math.abs(f.y+f.h/2-(obj.y+obj.h/2))<30){
            f.carrying=obj; obj.carried=true; playSound('pickup'); break;
          }
        }
        if(!f.carrying){
          for(const e of level.enemies){
            if(!e.alive || !e.stunned) continue;
            if(Math.abs(f.x+f.w/2-(e.x+e.w/2))<30 && Math.abs(f.y+f.h/2-(e.y+e.h/2))<30){
              f.carrying=e; e.carried=true; playSound('pickup'); break;
            }
          }
        }
      }
    } else if(f.carrying){
      const obj=f.carrying;
      obj.carried=false;
      obj.x=f.x+f.facing*20;
      obj.y=f.y-10;
      obj.vx=f.facing*8;
      obj.vy=-4;
      obj.grounded=false;
      f.carrying=null;
      playSound('throw');
      spawnParticles(obj.x,obj.y,'#FFF5E6',5,3,10);
    }

    if(f.carrying){
      f.carrying.x=f.x+f.w/2-10;
      f.carrying.y=f.y-20;
    }

    if(f.invincible>0) f.invincible--;

    f.animTimer++;
    if(f.state==='run') f.animFrame += 0.3;
    f.wingFlap++;

    if(f.grounded && Math.abs(f.vx)>2){
      f.runPT++;
      if(f.runPT%5===0) spawnParticles(f.x+f.w/2, f.y+f.h,'#c0a060',1,2,8);
    }

    // Bounds
    f.x = clamp(f.x, 0, level.width - f.w);

    // Fall-death
    if(f.y > H+50) chickenDie();
  }

  // ---------- Render helpers (sprites/draw) ----------
  function drawEggSprite(x,y,size){
    ctx.fillStyle='#FFF5E6';
    ctx.beginPath(); ctx.ellipse(x,y,size*0.55,size*0.7,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,240,220,0.6)';
    ctx.beginPath(); ctx.ellipse(x-size*0.15,y-size*0.2,size*0.2,size*0.3,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(180,160,130,0.4)'; ctx.lineWidth=0.8;
    ctx.beginPath(); ctx.ellipse(x,y,size*0.55,size*0.7,0,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle='rgba(180,160,130,0.3)';
    for(let i=0;i<4;i++){
      const sx=x+(Math.sin(i*2.3)*size*0.3);
      const sy=y+(Math.cos(i*1.7)*size*0.4);
      ctx.beginPath(); ctx.arc(sx,sy,1,0,Math.PI*2); ctx.fill();
    }
  }

  function drawChicken(x,y,facing,state,animFrame,invincible,wingFlap,carrying){
    if(invincible>0 && Math.floor(invincible/3)%2===0) return;

    ctx.save();
    ctx.translate(x+16,y+18);
    ctx.scale(facing,1);

    ctx.fillStyle='rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.ellipse(0,22,14,4,0,0,Math.PI*2); ctx.fill();

    const wF=Math.sin(wingFlap*0.3)*(state==='jump'||state==='fall'?10:3);
    ctx.fillStyle='#D48A00';
    ctx.beginPath();ctx.ellipse(-17,2+wF*0.5,6,9,-0.2+wF*0.03,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(17,2+wF*0.5,6,9,0.2-wF*0.03,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,200,50,0.3)';
    ctx.beginPath();ctx.ellipse(-17,0+wF*0.5,3,5,-0.2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(17,0+wF*0.5,3,5,0.2,0,Math.PI*2);ctx.fill();

    ctx.save();ctx.rotate(Math.PI/4);
    ctx.fillStyle='#C08000';
    const bs=16;
    ctx.roundRect(-bs-1,-bs-1,bs*2+2,bs*2+2,4).fill();
    ctx.fillStyle='#F0A500';
    ctx.roundRect(-bs,-bs,bs*2,bs*2,4).fill();
    ctx.fillStyle='rgba(200,150,30,0.4)';
    [[-8,-8],[8,-8],[-8,8],[8,8],[0,0],[-8,0],[8,0],[0,-8],[0,8]].forEach(([sx,sy])=>{
      ctx.beginPath();ctx.arc(sx,sy,3.8,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(180,130,20,0.3)';ctx.lineWidth=0.5;ctx.stroke();
    });
    ctx.restore();

    ctx.fillStyle='#FF6B8A';
    ctx.beginPath();ctx.moveTo(-3,-23);ctx.lineTo(0,-30);ctx.lineTo(3,-23);ctx.fill();
    ctx.fillStyle='#222';
    ctx.beginPath();ctx.moveTo(-1.5,-28);ctx.lineTo(0,-33);ctx.lineTo(1.5,-28);ctx.fill();

    const eyeY=state==='hurt'?-6:-7;
    ctx.fillStyle='#ddd';
    ctx.beginPath();ctx.arc(-7,eyeY+0.5,6.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(7,eyeY+0.5,6.5,0,Math.PI*2);ctx.fill();

    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(-7,eyeY,6,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(7,eyeY,6,0,Math.PI*2);ctx.fill();

    ctx.strokeStyle='#333';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.arc(-7,eyeY,6,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.arc(7,eyeY,6,0,Math.PI*2);ctx.stroke();

    if(state==='hurt'){
