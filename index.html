<title>🐔 Science Chicken - Platformer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;font-family:Arial,sans-serif;touch-action:none;}
canvas{display:block;image-rendering:pixelated;}
#ui-overlay{position:fixed;top:0;left:0;width:100%;pointer-events:none;z-index:10;display:flex;justify-content:space-between;padding:8px 14px;}
#ui-overlay>div{color:#fff;font-size:14px;text-shadow:1px 1px 3px rgba(0,0,0,0.7);}
#score-display{color:#f1c40f;font-weight:bold;}
#level-display{color:#74b9ff;font-size:12px;}
#lives-display{color:#e74c3c;}
#settings-btn{position:fixed;bottom:10px;right:50px;z-index:20;background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:18px;padding:6px 12px;border-radius:8px;cursor:pointer;pointer-events:all;}
#settings-btn:hover{background:rgba(255,255,255,0.3);}
#fullscreen-btn{position:fixed;bottom:10px;right:10px;z-index:20;background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:18px;padding:6px 12px;border-radius:8px;cursor:pointer;pointer-events:all;}
#fullscreen-btn:hover{background:rgba(255,255,255,0.3);}
#settings-panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(20,20,30,0.95);border:1px solid rgba(255,255,255,0.2);border-radius:14px;padding:20px 28px;z-index:30;display:none;min-width:280px;color:#fff;pointer-events:all;}
#settings-panel h3{margin-bottom:12px;color:#f1c40f;font-size:16px;}
.setting-row{margin:8px 0;display:flex;align-items:center;justify-content:space-between;font-size:13px;}
.setting-row label{flex:1;}
.setting-row input[type=range]{width:100px;}
.setting-row span{width:40px;text-align:right;font-size:12px;color:#74b9ff;}
.setting-row input[type=checkbox]{width:18px;height:18px;}
#settings-panel button{margin-top:10px;padding:6px 18px;background:#e74c3c;border:none;color:#fff;border-radius:6px;cursor:pointer;font-size:13px;}
#title-screen{position:fixed;top:0;left:0;width:100%;height:100%;z-index:25;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:all;cursor:pointer;}
#touch-controls{position:fixed;bottom:0;left:0;width:100%;z-index:15;display:none;pointer-events:all;}
#touch-controls button{background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.25);color:#fff;font-size:22px;border-radius:12px;padding:12px 18px;touch-action:manipulation;}
.touch-left-group{position:fixed;bottom:15px;left:15px;display:flex;gap:8px;}
.touch-right-group{position:fixed;bottom:15px;right:15px;display:flex;gap:8px;}
</style>

// Audio
let audioCtx = null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function playSound(type){
  if(!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);const t=audioCtx.currentTime;
  switch(type){
    case'jump':o.type='square';o.frequency.setValueAtTime(400,t);o.frequency.exponentialRampToValueAtTime(800,t+0.1);g.gain.setValueAtTime(0.08,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.15);o.start(t);o.stop(t+0.15);break;
    case'coin':o.type='square';o.frequency.setValueAtTime(988,t);o.frequency.setValueAtTime(1319,t+0.07);g.gain.setValueAtTime(0.08,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.2);o.start(t);o.stop(t+0.2);break;
    case'stomp':o.type='sawtooth';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(80,t+0.15);g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.2);o.start(t);o.stop(t+0.2);break;
    case'hurt':o.type='sawtooth';o.frequency.setValueAtTime(400,t);o.frequency.exponentialRampToValueAtTime(100,t+0.3);g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.35);o.start(t);o.stop(t+0.35);break;
    case'powerup':o.type='sine';[523,659,784,1047].forEach((f,i)=>o.frequency.setValueAtTime(f,t+i*0.08));g.gain.setValueAtTime(0.1,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.4);o.start(t);o.stop(t+0.4);break;
    case'throw':o.type='triangle';o.frequency.setValueAtTime(500,t);o.frequency.exponentialRampToValueAtTime(200,t+0.12);g.gain.setValueAtTime(0.08,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.15);o.start(t);o.stop(t+0.15);break;
    case'levelcomplete':o.type='square';[523,659,784,1047,784,1047,1319].forEach((f,i)=>o.frequency.setValueAtTime(f,t+i*0.12));g.gain.setValueAtTime(0.08,t);g.gain.exponentialRampToValueAtTime(0.001,t+1);o.start(t);o.stop(t+1);break;
    case'pickup':o.type='triangle';o.frequency.setValueAtTime(400,t);o.frequency.exponentialRampToValueAtTime(800,t+0.08);g.gain.setValueAtTime(0.08,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.12);o.start(t);o.stop(t+0.12);break;
    case'cluck':o.type='sawtooth';o.frequency.setValueAtTime(600,t);o.frequency.exponentialRampToValueAtTime(300,t+0.06);o.frequency.exponentialRampToValueAtTime(700,t+0.1);o.frequency.exponentialRampToValueAtTime(200,t+0.18);g.gain.setValueAtTime(0.06,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.2);o.start(t);o.stop(t+0.2);break;
    case'money':o.type='sine';o.frequency.setValueAtTime(1200,t);o.frequency.exponentialRampToValueAtTime(800,t+0.1);g.gain.setValueAtTime(0.05,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.12);o.start(t);o.stop(t+0.12);break;
  }
}

function drawChicken(x,y,facing,state,animFrame,invincible,wingFlap,carrying){
  if(invincible>0&&Math.floor(invincible/3)%2===0)return;
  ctx.save();
  ctx.translate(x+16,y+18);
  ctx.scale(facing,1);

  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath();ctx.ellipse(0,22,14,4,0,0,Math.PI*2);ctx.fill();

  const wF=Math.sin(wingFlap*0.3)*(state==='jump'||state==='fall'?10:3);
  ctx.fillStyle='#D48A00';
  ctx.beginPath();ctx.ellipse(-17,2+wF*0.5,6,9,-0.2+wF*0.03,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(17,2+wF*0.5,6,9,0.2-wF*0.03,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,200,50,0.3)';
  ctx.beginPath();ctx.ellipse(-17,0+wF*0.5,3,5,-0.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(17,0+wF*0.5,3,5,0.2,0,Math.PI*2);ctx.fill();

  ctx.save();ctx.rotate(Math.PI/4);
  ctx.fillStyle='#C08000';const bs=16;
  ctx.beginPath();ctx.roundRect(-bs-1,-bs-1,bs*2+2,bs*2+2,4);ctx.fill();
  ctx.fillStyle='#F0A500';ctx.beginPath();ctx.roundRect(-bs,-bs,bs*2,bs*2,4);ctx.fill();
  ctx.fillStyle='rgba(200,150,30,0.4)';
  [[-8,-8],[8,-8],[-8,8],[8,8],[0,0],[-8,0],[8,0],[0,-8],[0,8]].forEach(([sx,sy])=>{
    ctx.beginPath();ctx.arc(sx,sy,3.8,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(180,130,20,0.3)';ctx.lineWidth=0.5;ctx.stroke();
  });
  ctx.restore();

  ctx.fillStyle='#FF6B8A';
  ctx.beginPath();ctx.moveTo(-3,-23);ctx.lineTo(0,-30);ctx.lineTo(3,-23);ctx.fill();
  ctx.fillStyle='#222';ctx.beginPath();ctx.moveTo(-1.5,-28);ctx.lineTo(0,-33);ctx.lineTo(1.5,-28);ctx.fill();

  const eyeY=state==='hurt'?-6:-7;
  ctx.fillStyle='#ddd';ctx.beginPath();ctx.arc(-7,eyeY+0.5,6.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(7,eyeY+0.5,6.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-7,eyeY,6,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(7,eyeY,6,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#333';ctx.lineWidth=1.2;ctx.beginPath();ctx.arc(-7,eyeY,6,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.arc(7,eyeY,6,0,Math.PI*2);ctx.stroke();

  if(state==='hurt'){
    ctx.strokeStyle='#c00';ctx.lineWidth=2.5;
    [-7,7].forEach(ex=>{
      ctx.beginPath();ctx.moveTo(ex-3,eyeY-3);ctx.lineTo(ex+3,eyeY+3);ctx.stroke();
      ctx.beginPath();ctx.moveTo(ex+3,eyeY-3);ctx.lineTo(ex-3,eyeY+3);ctx.stroke();
    });
  } else {
    const lk=facing*1.5;
    ctx.fillStyle='#111';ctx.beginPath();ctx.arc(-7+lk,eyeY,3.8,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(7+lk,eyeY,3.8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-6+lk,eyeY-1.5,1.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(8+lk,eyeY-1.5,1.5,0,Math.PI*2);ctx.fill();
  }

  ctx.fillStyle='#FF8FA0';ctx.save();ctx.translate(0,4);ctx.rotate(Math.PI/4);
  ctx.beginPath();ctx.roundRect(-5,-5,10,10,1.5);ctx.fill();
  ctx.fillStyle='rgba(200,100,120,0.4)';ctx.beginPath();ctx.arc(0,0,2.5,0,Math.PI*2);ctx.fill();
  ctx.restore();

  const legA=state==='run'?Math.sin(animFrame*0.5)*5:0;
  ctx.strokeStyle='#222';ctx.lineWidth=2.8;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-6,18);ctx.lineTo(-6,27+legA);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-10,29+legA);ctx.lineTo(-6,27+legA);ctx.lineTo(-2,29+legA);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-6,27+legA);ctx.lineTo(-6,30+legA);ctx.stroke();
  ctx.beginPath();ctx.moveTo(6,18);ctx.lineTo(6,27-legA);ctx.stroke();
  ctx.beginPath();ctx.moveTo(2,29-legA);ctx.lineTo(6,27-legA);ctx.lineTo(10,29-legA);ctx.stroke();
  ctx.beginPath();ctx.moveTo(6,27-legA);ctx.lineTo(6,30-legA);ctx.stroke();

  if(carrying){drawEggSprite(0,-34,12);}
  ctx.restore();
}

function drawEggSprite(x,y,size){
  ctx.fillStyle='#FFF5E6';ctx.beginPath();ctx.ellipse(x,y,size*0.55,size*0.7,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,240,220,0.6)';ctx.beginPath();ctx.ellipse(x-size*0.15,y-size*0.2,size*0.2,size*0.3,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(180,160,130,0.4)';ctx.lineWidth=0.8;ctx.beginPath();ctx.ellipse(x,y,size*0.55,size*0.7,0,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='rgba(180,160,130,0.3)';
  for(let i=0;i<4;i++){const sx=x+(Math.sin(i*2.3)*size*0.3);const sy=y+(Math.cos(i*1.7)*size*0.4);ctx.beginPath();ctx.arc(sx,sy,1,0,Math.PI*2);ctx.fill();}
}

// ============ DRAW ENEMIES ============

      }

      break;

}

    case'obsidian':ctx.fillStyle='#1d1d2d';ctx.fillRect(x,y,p.w,p.h);ctx.fillStyle='#3a3a5a';ctx.fillRect(x,y,p.w,3);ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fillRect(x+5,y+5,4,4);ctx.fillRect(x+p.w-12,y+3,3,3);break;

// Collision
function rectCollide(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function resolveCollision(entity,platforms){
  let grounded=false,onPlatform=null;
  for(const p of platforms){
    if(!rectCollide(entity,p))continue;
    const ox=Math.min(entity.x+entity.w-p.x,p.x+p.w-entity.x);
    const oy=Math.min(entity.y+entity.h-p.y,p.y+p.h-entity.y);
    if(oy<ox){if(entity.y+entity.h/2<p.y+p.h/2){entity.y=p.y-entity.h;entity.vy=0;grounded=true;onPlatform=p;}else{entity.y=p.y+p.h;entity.vy=Math.max(0,entity.vy);}}
    else{if(entity.x+entity.w/2<p.x+p.w/2)entity.x=p.x-entity.w;else entity.x=p.x+p.w;entity.vx=0;}
  }
  return{grounded,onPlatform};
}

// Game logic
function startGame(){
  initAudio();document.getElementById('title-screen').style.display='none';
  score=0;lives=3;currentLevel=0;gateMoneyParticles=[];loadLevel(0);gameState='playing';
}
function loadLevel(index){
  currentLevel=index;level=createLevel(index);
  ck.x=100;ck.y=300;ck.vx=0;ck.vy=0;ck.grounded=false;ck.carrying=null;
  ck.hurtTimer=0;ck.invincible=0;ck.state='idle';
  ck.maxSpeed=baseMaxSpeed;ck.accel=baseAccel;ck.jumpForce=-baseJumpForce;
  camera.x=0;camera.y=0;particles=[];floatingTexts=[];transitionTimer=90;
}

function triggerGameOver(){
  gameState='gameOver';
  deathTimer=120;
  gameOverFact=scienceFacts[Math.floor(Math.random()*scienceFacts.length)];
  gameOverFactTimer=FACT_DISPLAY_FRAMES;
}

function updateChicken(){
  if(transitionTimer>0)return;
  const f=ck;
  if(f.hurtTimer>0){f.hurtTimer--;if(f.hurtTimer<=0)f.state='idle';return;}
  let mx=0;if(isLeft())mx=-1;if(isRight())mx=1;
  if(mx!==0){f.vx+=mx*f.accel;f.facing=mx;f.state=f.grounded?'run':(f.vy<0?'jump':'fall');}
  else{f.vx*=f.friction;if(f.grounded)f.state='idle';}
  f.vx=Math.max(-f.maxSpeed,Math.min(f.maxSpeed,f.vx));
  if(f.grounded)f.coyoteTime=6;else f.coyoteTime=Math.max(0,f.coyoteTime-1);
  if(isJump()&&!f.jumpHeld)f.jumpBufferTime=8;else f.jumpBufferTime=Math.max(0,f.jumpBufferTime-1);
  if(f.jumpBufferTime>0&&f.coyoteTime>0){f.vy=f.jumpForce;f.jumpTime=f.maxJumpTime;f.grounded=false;f.coyoteTime=0;f.jumpBufferTime=0;f.state='jump';playSound('jump');playSound('cluck');spawnParticles(f.x+f.w/2,f.y+f.h,'#f0a500',4,3,12);}
  if(isJump()&&f.jumpTime>0){f.vy=Math.min(f.vy,f.jumpForce*0.7);f.jumpTime--;}else f.jumpTime=0;
  f.jumpHeld=isJump();
  f.vy+=f.gravity;f.vy=Math.min(f.vy,12);
  f.x+=f.vx;f.y+=f.vy;
  const res=resolveCollision(f,level.platforms);f.grounded=res.grounded;
  if(res.onPlatform&&res.onPlatform.type==='moving'){if(res.onPlatform._dx)f.x+=res.onPlatform._dx;if(res.onPlatform._dy)f.y+=res.onPlatform._dy;}
  if(!f.grounded&&f.vy>0)f.state='fall';
  if(isPickup()){
    if(!f.carrying){
      for(const obj of level.pickupObjects){if(!obj.active||obj.carried)continue;if(Math.abs(f.x+f.w/2-(obj.x+obj.w/2))<30&&Math.abs(f.y+f.h/2-(obj.y+obj.h/2))<30){f.carrying=obj;obj.carried=true;playSound('pickup');break;}}
      if(!f.carrying){for(const e of level.enemies){if(!e.alive||!e.stunned)continue;if(Math.abs(f.x+f.w/2-(e.x+e.w/2))<30&&Math.abs(f.y+f.h/2-(e.y+e.h/2))<30){f.carrying=e;e.carried=true;playSound('pickup');break;}}}
    }
  } else if(f.carrying){
    const obj=f.carrying;obj.carried=false;obj.x=f.x+f.facing*20;obj.y=f.y-10;obj.vx=f.facing*8;obj.vy=-4;obj.grounded=false;f.carrying=null;playSound('throw');spawnParticles(obj.x,obj.y,'#FFF5E6',5,3,10);
  }
  if(f.carrying){f.carrying.x=f.x+f.w/2-10;f.carrying.y=f.y-20;}
  if(f.invincible>0)f.invincible--;
  f.animTimer++;if(f.state==='run')f.animFrame+=0.3;f.wingFlap++;
  if(f.grounded&&Math.abs(f.vx)>2){f.runPT++;if(f.runPT%5===0)spawnParticles(f.x+f.w/2,f.y+f.h,'#c0a060',1,2,8);}
  if(f.x<0)f.x=0;if(f.x>level.width-f.w)f.x=level.width-f.w;
  if(f.y>H+50)chickenDie();
}

function chickenDie(){
  if(infiniteLives){ck.x=100;ck.y=300;ck.vx=0;ck.vy=0;ck.invincible=60;playSound('hurt');screenShake=10;return;}
  lives--;playSound('hurt');screenShake=15;
  if(lives<=0){triggerGameOver();}
  else{gameState='dead';deathTimer=60;}
}
function hurtChicken(){
  if(ck.invincible>0||ck.hurtTimer>0)return;
  ck.hurtTimer=30;ck.invincible=90;ck.vy=-6;ck.vx=-ck.facing*3;ck.state='hurt';
  if(ck.carrying){ck.carrying.carried=false;ck.carrying.vx=ck.facing*3;ck.carrying.vy=-5;ck.carrying=null;}
  screenShake=10;playSound('hurt');spawnParticles(ck.x+ck.w/2,ck.y+ck.h/2,'#e74c3c',10,5,20);
  if(infiniteLives)return;
  lives--;if(lives<=0){triggerGameOver();}
}

function updateEnemies(){
  if(transitionTimer>0)return;
  for(const e of level.enemies){
    if(!e.alive||e.carried)continue;
    if(e.stunned){e.stunnedTimer--;if(e.stunnedTimer<=0){e.stunned=false;e.vx=(Math.random()>0.5?1:-1)*1.2;}
      if(e.vx!==0||(e.vy!==undefined&&e.vy!==0)){e.x+=(e.vx||0);if(e.vy!==undefined){e.vy+=0.4;e.y+=e.vy;}e.vx*=0.95;
        for(const o of level.enemies){if(o===e||!o.alive)continue;if(Math.abs(e.x-o.x)<20&&Math.abs(e.y-o.y)<20&&Math.abs(e.vx)>2){o.alive=false;score+=200;spawnParticles(o.x+o.w/2,o.y+o.h/2,'#e74c3c',12,6,25);spawnFloatingText(o.x,o.y-10,'+200','#f1c40f');playSound('stomp');}}}continue;}
    e.x+=e.vx;if(Math.abs(e.x-e.origX)>e.patrol)e.vx*=-1;
    if(ck.invincible<=0&&ck.hurtTimer<=0){
      if(rectCollide(ck,{x:e.x,y:e.y,w:e.w,h:e.h})){
        if(ck.vy>0&&ck.y+ck.h-e.y<15){e.stunned=true;e.stunnedTimer=300;e.vx=0;ck.vy=-8;score+=100;playSound('stomp');spawnParticles(e.x+e.w/2,e.y,'#f39c12',8,4,20);spawnFloatingText(e.x,e.y-10,'+100','#f1c40f');
          if(level.facts&&level.facts.length>0)spawnFloatingText(e.x,e.y-30,level.facts[Math.floor(Math.random()*level.facts.length)],'#74b9ff');screenShake=5;}
        else hurtChicken();
      }
    }
  }
}

function updatePickupObjects(){
  for(const p of level.pickupObjects){
    if(!p.active||p.carried)continue;
    if(p.vx!==0||!p.grounded){p.vy=(p.vy||0)+0.4;p.x+=p.vx;p.y+=p.vy;p.vx*=0.98;
      const res=resolveCollision(p,level.platforms);p.grounded=res.grounded;if(p.grounded){p.vy=0;p.vx*=0.8;if(Math.abs(p.vx)<0.1)p.vx=0;}
      if(Math.abs(p.vx)>2){for(const e of level.enemies){if(!e.alive)continue;if(Math.abs(p.x+p.w/2-(e.x+e.w/2))<20&&Math.abs(p.y+p.h/2-(e.y+e.h/2))<20){e.alive=false;score+=200;spawnParticles(e.x+e.w/2,e.y+e.h/2,'#e74c3c',12,6,25);spawnFloatingText(e.x,e.y-10,'+200','#f1c40f');playSound('stomp');p.vx*=0.5;}}}
      if(p.y>H+50)p.active=false;
    }
  }
}

function updateMovingPlatforms(){for(const p of level.platforms){if(p.type!=='moving')continue;const px=p.x,py=p.y;p.moveTimer+=0.02*(p.speed||1);if(p.moveX)p.x=p.origX+Math.sin(p.moveTimer)*p.moveX;if(p.moveY)p.y=p.origY+Math.sin(p.moveTimer)*p.moveY;p._dx=p.x-px;p._dy=p.y-py;}}
function updateCoins(){if(transitionTimer>0)return;for(const c of level.coins){if(c.collected)continue;if(Math.abs(ck.x+ck.w/2-c.x)<18&&Math.abs(ck.y+ck.h/2-c.y)<18){c.collected=true;score+=10;playSound('coin');spawnParticles(c.x,c.y,'#f1c40f',6,4,15);spawnFloatingText(c.x,c.y-10,'+10','#f1c40f');}}}
function updatePowerups(){if(transitionTimer>0)return;for(const p of level.powerups){if(p.collected)continue;if(Math.abs(ck.x+ck.w/2-p.x)<20&&Math.abs(ck.y+ck.h/2-p.y)<20){p.collected=true;if(p.type==='coffee_boost'){ck.maxSpeed=baseMaxSpeed+2;ck.jumpForce=-(baseJumpForce+1.5);setTimeout(()=>{ck.maxSpeed=baseMaxSpeed;ck.jumpForce=-baseJumpForce;},8000);spawnFloatingText(p.x,p.y-20,'☕ COFFEE BOOST!','#e67e22');}else{ck.invincible=300;spawnFloatingText(p.x,p.y-20,'📎 STAPLE SHIELD!','#3498db');}score+=50;playSound('powerup');spawnParticles(p.x,p.y,'#f39c12',15,6,25);}}}
function checkGoal(){if(transitionTimer>0)return;if(rectCollide(ck,level.goal)){gameState='levelComplete';transitionTimer=180;playSound('levelcomplete');score+=500;spawnParticles(ck.x+ck.w/2,ck.y+ck.h/2,'#00b894',30,8,40);spawnGateMoney(40);}}
function updateCamera(){const tx=ck.x-W/3,ty=ck.y-H/2;camera.x+=(tx-camera.x)*0.08;camera.y+=(ty-camera.y)*0.05;camera.x=Math.max(0,Math.min(level.width-W,camera.x));camera.y=Math.max(-100,Math.min(0,camera.y));}
function updateParticles(){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life--;if(p.life<=0)particles.splice(i,1);}for(let i=floatingTexts.length-1;i>=0;i--){const ft=floatingTexts[i];ft.y+=ft.vy;ft.life--;if(ft.life<=0)floatingTexts.splice(i,1);}}
function updateGateMoney(){for(let i=gateMoneyParticles.length-1;i>=0;i--){const m=gateMoneyParticles[i];m.y+=m.vy;m.x+=m.vx;m.rot+=m.rotSpd;m.life--;if(m.life<=0)gateMoneyParticles.splice(i,1);}}

function update(){
  time++;
  if(gameState==='playing'){
    if(transitionTimer>0)transitionTimer--;
    updateMovingPlatforms();updateChicken();updateEnemies();updatePickupObjects();updateCoins();updatePowerups();checkGoal();updateCamera();updateParticles();updateGateMoney();
    if(screenShake>0)screenShake--;
  } else if(gameState==='dead'){
    deathTimer--;updateParticles();if(deathTimer<=0){loadLevel(currentLevel);gameState='playing';}
  } else if(gameState==='levelComplete'){
    transitionTimer--;updateParticles();updateGateMoney();
    if(transitionTimer<=0){if(currentLevel<TOTAL_LEVELS-1){loadLevel(currentLevel+1);gameState='playing';}else gameState='win';}
  } else if(gameState==='gameOver'){
    updateParticles();
    if(gameOverFactTimer>0)gameOverFactTimer--;
  }

  document.getElementById('score-display').textContent=`Score: ${score}`;
  document.getElementById('level-display').textContent=`Level ${currentLevel+1}/${TOTAL_LEVELS}${level?' - '+level.name:''}`;
  const livesText=infiniteLives?'Lives: ♾️':`Lives: ${'🥚'.repeat(Math.max(0,lives))}`;
  document.getElementById('lives-display').textContent=livesText;
}

function drawMoneyBill(x,y,rot,size,alpha){
  ctx.save();ctx.translate(x,y);ctx.rotate(rot);ctx.globalAlpha=alpha;
  ctx.fillStyle='#2a8a2a';ctx.fillRect(-size/2,-size/3,size,size*0.66);
  ctx.fillStyle='#3aaa3a';ctx.fillRect(-size/2+1,-size/3+1,size-2,size*0.66-2);
  ctx.fillStyle='#2a8a2a';ctx.font=`bold ${size*0.35}px Arial`;ctx.textAlign='center';ctx.fillText('$',0,size*0.1);
  ctx.globalAlpha=1;ctx.restore();
}

// Helper: word-wrap text on canvas
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');
  let line='';
  let currentY=y;
  for(const word of words){
    const testLine=line+(line?' ':'')+word;
    if(ctx.measureText(testLine).width>maxWidth&&line){
      ctx.fillText(line,x,currentY);
      currentY+=lineHeight;
      line=word;
    } else {
      line=testLine;
    }
  }
  ctx.fillText(line,x,currentY);
}

function draw(){
  ctx.save();
  if(screenShake>0)ctx.translate((Math.random()-0.5)*screenShake*1.5,(Math.random()-0.5)*screenShake*1.5);

  // ============ TITLE SCREEN WITH CONTROLS ============
  if(gameState==='title'){
    drawBackground();
    drawChicken(W/2-16,H/2+60,1,'idle',0,0,time,false);

    // Title
    ctx.fillStyle='#fff';ctx.font='bold 36px Arial';ctx.textAlign='center';
    ctx.fillText('🐔 SCIENCE CHICKEN',W/2,H*0.10);

    // Subtitle
    ctx.font='20px Arial';ctx.fillStyle='#f1c40f';
    ctx.fillText('A K-8 Science Adventure!',W/2,H*0.17);

    // Controls box background
    ctx.fillStyle='rgba(0,0,0,0.6)';
    const boxW=Math.min(380,W-40);
    const boxX=W/2-boxW/2, boxY=H*0.22, boxH=210;
    ctx.beginPath();ctx.roundRect(boxX,boxY,boxW,boxH,14);ctx.fill();

    ctx.fillStyle='#fff';ctx.font='bold 18px Arial';ctx.textAlign='center';
    ctx.fillText('🎮 CONTROLS',W/2,boxY+28);

    ctx.font='15px Arial';ctx.fillStyle='#ecf0f1';
    const controls=[
      '⬅️ ➡️  or  A / D  —  Move left / right',
      '⬆️  or  W / Space  —  Jump (hold to jump higher)',
      'X  or  Shift  —  Pick up / Throw eggs',
      '🐛 Stomp enemies from above to stun them!',
      '🥚 Collect eggs, coins & reach the 🔬 gate!',
      '☕ Coffee = speed boost  |  📎 Staple = shield',
    ];
    controls.forEach((line,i)=>{
      ctx.fillText(line, W/2, boxY+55+i*25);
    });

    // Prompt
    ctx.fillStyle='#f39c12';ctx.font='bold 20px Arial';
    ctx.fillText('Press ENTER or Click to Start',W/2,boxY+boxH+35);

    // Floating science icons
    ctx.globalAlpha=0.25;ctx.font='22px Arial';
    ['🧬','🔬','🌋','🚀','⚗️','🧪','🌍','⭐','🫀','🌿'].forEach((ic,i)=>{
      const ix=(W*0.08+i*W*0.09+Math.sin(time*0.02+i)*18)%W;
      const iy=(H*0.08+Math.sin(time*0.015+i*1.3)*35);
      ctx.fillText(ic,ix,iy);
    });
    ctx.globalAlpha=1;ctx.restore();return;
  }

  if(!level){ctx.restore();return;}
  drawBackground();

  // Level intro transition
  if(transitionTimer>0&&gameState==='playing'){
    level.decorations.forEach(d=>drawDecoration(d));level.platforms.forEach(p=>drawPlatform(p));
    level.coins.forEach(c=>drawCoin(c));level.powerups.forEach(p=>drawPowerup(p));
    level.pickupObjects.forEach(p=>drawPickupObject(p));level.enemies.forEach(e=>drawEnemy(e));
    drawGoal(level.goal);
    drawChicken(ck.x-camera.x,ck.y-camera.y,ck.facing,ck.state,ck.animFrame,ck.invincible,ck.wingFlap,ck.carrying);
    const alpha=Math.min(1,transitionTimer/50);
    ctx.fillStyle=`rgba(0,0,0,${alpha*0.8})`;ctx.fillRect(0,0,W,H);
    ctx.fillStyle=`rgba(255,255,255,${alpha})`;ctx.font='bold 26px Arial';ctx.textAlign='center';
    ctx.fillText(level.name,W/2,H/2-25);
    ctx.font='14px Arial';ctx.fillStyle=`rgba(180,200,255,${alpha*0.8})`;
    ctx.fillText(level.scienceTopic,W/2,H/2+5);
    ctx.font='13px Arial';ctx.fillStyle=`rgba(150,200,150,${alpha*0.7})`;
    ctx.fillText(`Level ${currentLevel+1} of ${TOTAL_LEVELS}`,W/2,H/2+28);
    ctx.restore();return;
  }

  level.decorations.forEach(d=>drawDecoration(d));level.platforms.forEach(p=>drawPlatform(p));
  level.coins.forEach(c=>drawCoin(c));level.powerups.forEach(p=>drawPowerup(p));
  level.pickupObjects.forEach(p=>drawPickupObject(p));level.enemies.forEach(e=>drawEnemy(e));
  drawGoal(level.goal);
  drawChicken(ck.x-camera.x,ck.y-camera.y,ck.facing,ck.state,ck.animFrame,ck.invincible,ck.wingFlap,ck.carrying);

  particles.forEach(p=>{const a=p.life/p.maxLife;ctx.globalAlpha=a;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x-camera.x,p.y-camera.y,p.size*a,0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;
  floatingTexts.forEach(ft=>{const a=ft.life/(ft.big?90:60);ctx.globalAlpha=a;ctx.fillStyle=ft.color;ctx.font=ft.big?'bold 18px Arial':(ft.text.length>20?'bold 10px Arial':'bold 14px Arial');ctx.textAlign='center';ctx.fillText(ft.text,ft.x-camera.x,ft.y-camera.y);});ctx.globalAlpha=1;

  // Progress bar
  const prog=ck.x/level.width;
  ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fillRect(W/2-100,10,200,7);
  ctx.fillStyle='#00b894';ctx.fillRect(W/2-100,10,200*prog,7);
  ctx.font='9px Arial';ctx.textAlign='center';ctx.fillText('🐔',W/2-100+200*prog,11);

  // Controls hint
  ctx.fillStyle='rgba(255,255,255,0.2)';ctx.font='10px Arial';ctx.textAlign='left';
  ctx.fillText('← → Move | ↑/Space Jump | Shift Grab/Throw Eggs',10,H-8);
  if(gameSpeed!==1.0){ctx.fillStyle='rgba(240,165,0,0.5)';ctx.font='bold 11px Arial';ctx.textAlign='right';ctx.fillText(`Speed: ${gameSpeed.toFixed(1)}x`,W-10,H-8);}
  if(infiniteLives){ctx.fillStyle='rgba(240,165,0,0.5)';ctx.font='bold 11px Arial';ctx.textAlign='right';ctx.fillText('♾️ INFINITE LIVES',W-10,22);}

  // State overlays
  if(gameState==='dead'){
    ctx.fillStyle=`rgba(0,0,0,${0.5*(1-deathTimer/60)})`;ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#e74c3c';ctx.font='bold 34px Arial';ctx.textAlign='center';ctx.fillText('🐔 Oops!',W/2,H/2);
    ctx.font='16px Arial';ctx.fillStyle='#eee';ctx.fillText(`${lives} egg${lives===1?'':'s'} remaining`,W/2,H/2+28);
  }

  if(gameState==='levelComplete'){
    const a=Math.min(1,(180-transitionTimer)/40);
    ctx.fillStyle=`rgba(0,0,0,${a*0.7})`;ctx.fillRect(0,0,W,H);

    gateMoneyParticles.forEach(m=>{const ma=m.life/m.maxLife;drawMoneyBill(m.x,m.y,m.rot,m.size,ma);});

    ctx.fillStyle=`rgba(0,184,148,${a})`;ctx.font='bold 34px Arial';ctx.textAlign='center';
    ctx.fillText(`🎉 ${GATE_NAMES[currentLevel]} Passed! 🎉`,W/2,H/2-40);
    ctx.fillStyle=`rgba(241,196,15,${a})`;ctx.font='bold 22px Arial';
    ctx.fillText(`+500 points  💰💰💰`,W/2,H/2-5);
    ctx.fillStyle=`rgba(255,255,255,${a*0.8})`;ctx.font='16px Arial';
    ctx.fillText(`Congratulations, Science Chicken!`,W/2,H/2+25);
    if(level.facts){ctx.fillStyle=`rgba(116,185,255,${a*0.7})`;ctx.font='13px Arial';ctx.fillText(level.facts[Math.floor(time*0.02)%level.facts.length],W/2,H/2+50);}
  }

  // ============ GAME OVER WITH SCIENCE FACT ============
  if(gameState==='gameOver'){
    ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(0,0,W,H);

    // GAME OVER text
    ctx.fillStyle='#e74c3c';ctx.font='bold 48px Arial';ctx.textAlign='center';
    ctx.fillText('GAME OVER',W/2,H*0.18);

    // Score
    ctx.fillStyle='#f1c40f';ctx.font='24px Arial';
    ctx.fillText(`Final Score: ${score}`,W/2,H*0.27);

    ctx.fillStyle='#f0a500';ctx.font='14px Arial';
    ctx.fillText(`Reached: Level ${currentLevel+1} - ${level.name}`,W/2,H*0.33);

    // Science fact box
    ctx.fillStyle='rgba(44,62,80,0.9)';
    const fboxW=Math.min(460,W-40);
    const fboxX=W/2-fboxW/2, fboxY=H*0.38, fboxH=130;
    ctx.beginPath();ctx.roundRect(fboxX,fboxY,fboxW,fboxH,12);ctx.fill();

    // Fact header
    ctx.fillStyle='#f39c12';ctx.font='bold 17px Arial';ctx.textAlign='center';
    ctx.fillText('🧪 Useless Science Fact:',W/2,fboxY+30);

    // Fact text (word-wrapped)
    ctx.fillStyle='#ecf0f1';ctx.font='15px Arial';
    wrapText(gameOverFact,W/2,fboxY+60,fboxW-40,22);

    // Countdown or restart prompt
    if(gameOverFactTimer>0){
      const secsLeft=Math.ceil(gameOverFactTimer/60);
      ctx.fillStyle='#95a5a6';ctx.font='16px Arial';
      ctx.fillText(`Absorbing knowledge... ${secsLeft}s`,W/2,H*0.80);

      // Animated brain emoji
      const brainBob=Math.sin(time*0.1)*5;
      ctx.font='30px Arial';
      ctx.fillText('🧠',W/2,H*0.86+brainBob);
    } else {
      ctx.fillStyle='#2ecc71';ctx.font='bold 20px Arial';
      ctx.fillText('Press ENTER or Click to Restart',W/2,H*0.80);
    }

    ctx.fillStyle='#666';ctx.font='11px Arial';
    ctx.fillText('Tip: Enable Infinite Lives in ⚙️ Settings to explore all levels',W/2,H*0.92);
  }

  if(gameState==='win'){
    ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(0,0,W,H);
    for(let i=0;i<35;i++){ctx.fillStyle=['#e74c3c','#f39c12','#2ecc71','#3498db','#9b59b6','#f0a500'][i%6];const cx=(Math.sin(time*0.02+i*0.7)*0.5+0.5)*W,cy=((time*0.5+i*30)%(H+40))-20;ctx.fillRect(cx,cy,6,6);}
    if(gateMoneyParticles.length<30&&time%3===0)spawnGateMoney(2);
    gateMoneyParticles.forEach(m=>{const ma=m.life/m.maxLife;drawMoneyBill(m.x,m.y,m.rot,m.size,ma);});
    updateGateMoney();

    ctx.fillStyle='#f1c40f';ctx.font='bold 38px Arial';ctx.textAlign='center';
    ctx.fillText('🐔 SCIENCE CHAMPION! 🐔',W/2,H/2-55);
    ctx.fillStyle='#eee';ctx.font='22px Arial';ctx.fillText(`Final Score: ${score}`,W/2,H/2-15);
    ctx.fillStyle='#00b894';ctx.font='15px Arial';ctx.fillText('All gates passed! The chicken mastered science!',W/2,H/2+15);
    ctx.fillStyle='#74b9ff';ctx.font='12px Arial';
    ['🌿 Life Science','🌋 Earth Science','🧪 Chemistry','🚀 Space','⛈️ Weather','🫀 Human Body'].forEach((d,i)=>{ctx.fillText(d,W/2-110+(i%3)*110,H/2+40+Math.floor(i/3)*18);});
    ctx.fillStyle='#999';ctx.font='14px Arial';ctx.fillText('Press ENTER or click to play again',W/2,H/2+85);
  }

  ctx.restore();
}

let lastTime=0;
function gameLoop(ts){
  if(!lastTime)lastTime=ts;
  const delta=ts-lastTime;lastTime=ts;
  speedFrameAccum+=delta*gameSpeed;
  const ft=1000/60;
  let steps=0;
  while(speedFrameAccum>=ft&&steps<4){update();speedFrameAccum-=ft;steps++;}
  draw();requestAnimationFrame(gameLoop);
}

level=createLevel(0);
requestAnimationFrame(gameLoop);
</script>
