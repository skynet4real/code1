<meta charset="UTF-8">

<title>Science Chicken - Platformer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:Arial,sans-serif;}
canvas{border:2px solid #333;border-radius:8px;image-rendering:pixelated;max-width:100vw;max-height:80vh;}
#ui{position:absolute;top:10px;left:10px;color:#fff;font-size:14px;z-index:10;pointer-events:none;}
#ui div{margin:2px 0;text-shadow:1px 1px 2px #000;}
#settings-btn{position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.5);color:#fff;border:1px solid #555;border-radius:6px;padding:6px 12px;cursor:pointer;z-index:10;font-size:14px;}
#settings-btn:hover{background:rgba(50,50,50,0.8);}
#settings-panel{position:absolute;top:45px;right:10px;background:rgba(20,20,30,0.95);color:#fff;border:1px solid #555;border-radius:8px;padding:15px;z-index:10;display:none;min-width:220px;}
#settings-panel label{display:block;margin:8px 0;font-size:13px;cursor:pointer;}
#settings-panel input[type=range]{width:100%;margin:4px 0;}
#settings-panel button{margin-top:8px;padding:6px 12px;background:#333;color:#fff;border:1px solid #555;border-radius:4px;cursor:pointer;width:100%;}
#settings-panel button:hover{background:#555;}
#title-screen{position:absolute;top:0;left:0;width:100%;height:100%;z-index:5;pointer-events:none;}
.touch-controls{position:absolute;bottom:10px;left:0;width:100%;display:flex;justify-content:space-between;padding:0 10px;z-index:10;display:none;}
@media(pointer:coarse){.touch-controls{display:flex;}}
.touch-btn{background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.3);border-radius:50%;width:60px;height:60px;display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;user-select:none;-webkit-user-select:none;touch-action:manipulation;}
.touch-btn:active{background:rgba(255,255,255,0.35);}
.touch-left{display:flex;gap:8px;}
.touch-right{display:flex;gap:8px;}
</style>
</head>

function addTouchEvents(el,key){
  if(!el)return;
  el.addEventListener('touchstart',e=>{e.preventDefault();touchState[key]=true;},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();touchState[key]=false;},{passive:false});
  el.addEventListener('touchcancel',e=>{touchState[key]=false;});
}

function startGame(){
  initAudio();document.getElementById('title-screen').style.display='none';
  score=0;lives=3;currentLevel=0;gateMoneyParticles=[];
  loadLevel(0);
  gameState='playing';
}

function loadLevel(index){
  // Clear all animation states first
  fallDeathActive=false;
  fallDeathTimer=0;
  fallDeathParticles=[];
  fallDeathScreamPlayed=false;

  currentLevel=index;
  level=createLevel(index);

  // Get player start position from level data
  const startX=(level.playerStart&&level.playerStart.x)||100;
  const startY=(level.playerStart&&level.playerStart.y)||350;

  // Fully reset chicken state
  resetChicken(startX, startY);

  // Snap chicken to ground - find the first platform below start position
  let bestGroundY=468; // default ground
  for(const p of level.platforms){
    if(p.type==='moving')continue;
    if(ck.x+ck.w>p.x && ck.x<p.x+p.w && p.y>=startY && p.y<bestGroundY){
      bestGroundY=p.y;
    }
  }
  ck.y=bestGroundY-ck.h;
  ck.grounded=true;

  // Reset camera to player position immediately (no lerp)
  camera.x=Math.max(0,Math.min(level.width-W,ck.x-W/3));
  camera.y=Math.max(-100,Math.min(0,ck.y-H/2));

  // Clear all transient state
  particles=[];
  floatingTexts=[];
  screenShake=0;
  deathTimer=0;
  transitionTimer=90;
}

function drawBurningChicken(x,y,timer){
  ctx.save();
  ctx.translate(x,y);

  const shk=Math.sin(timer*2)*4;
  ctx.translate(shk,0);

  const fireColors=['#ff2200','#ff4500','#ff6600','#ff8800','#ffaa00','#ffcc00'];
  for(let i=0;i<12;i++){
    const fx=(Math.random()-0.5)*40;
    const fy=Math.random()*20-30;
    const fh=10+Math.random()*20;
    const fc=fireColors[Math.floor(Math.random()*fireColors.length)];
    ctx.fillStyle=fc;
    ctx.globalAlpha=0.5+Math.random()*0.5;
    ctx.beginPath();
    ctx.ellipse(fx,fy,3+Math.random()*4,fh*0.5,0,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;

  const burnProgress=Math.min(1,timer/60);
  const bodyR=Math.floor(240*(1-burnProgress*0.7));
  const bodyG=Math.floor(165*(1-burnProgress*0.9));
  const bodyB=0;

  ctx.fillStyle=`rgb(${bodyR},${bodyG},${bodyB})`;
  ctx.save();ctx.rotate(Math.PI/4);
  ctx.beginPath();ctx.roundRect(-14,-14,28,28,4);ctx.fill();
  ctx.restore();

  ctx.strokeStyle='#fff';ctx.lineWidth=2.5;
  [-7,7].forEach(ex=>{
    ctx.beginPath();ctx.moveTo(ex-3,-10);ctx.lineTo(ex+3,-4);ctx.stroke();
    ctx.beginPath();ctx.moveTo(ex+3,-10);ctx.lineTo(ex-3,-4);ctx.stroke();
  });

  ctx.fillStyle='#FF8FA0';
  ctx.beginPath();
  ctx.ellipse(0,6,7,5+Math.sin(timer*1.5)*2,0,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#cc0000';
  ctx.beginPath();
  ctx.ellipse(0,6,4,3+Math.sin(timer*1.5)*1,0,0,Math.PI*2);
  ctx.fill();

  if(timer%15<8){
    ctx.fillStyle='#fff';
    ctx.font='bold 14px Arial';
    ctx.textAlign='center';
    const screams=['BAWK!','SQUAWK!','AAAK!','BKAWK!'];
    const si=Math.floor(timer/15)%screams.length;
    ctx.fillText(screams[si],(Math.random()-0.5)*10,-30-Math.random()*10);
  }

  ctx.fillStyle='rgba(80,80,80,0.3)';
  for(let i=0;i<4;i++){
    const sx=(Math.random()-0.5)*20;
    const sy=-20-timer*0.5-Math.random()*20;
    ctx.beginPath();ctx.arc(sx,sy,4+Math.random()*4,0,Math.PI*2);ctx.fill();
  }

  ctx.restore();
}

function updateChicken(){
  if(transitionTimer>0)return;

  // If fall death animation is active, handle that instead
  if(fallDeathActive){
    fallDeathTimer++;
    if(fallDeathTimer%2===0){
      spawnFallDeathFireParticles(fallDeathX,fallDeathY);
    }
    if(!fallDeathScreamPlayed){
      playSound('chicken_scream');
      fallDeathScreamPlayed=true;
    }
    if(fallDeathTimer%20===0&&fallDeathTimer<80){
      playSound('chicken_scream');
    }
    for(let i=fallDeathParticles.length-1;i>=0;i--){
      const p=fallDeathParticles[i];
      p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life--;
      if(p.life<=0)fallDeathParticles.splice(i,1);
    }
    if(fallDeathTimer>=90){
      fallDeathActive=false;
      fallDeathTimer=0;
      fallDeathParticles=[];
      fallDeathScreamPlayed=false;
      if(infiniteLives){
        const startX=(level.playerStart&&level.playerStart.x)||100;
        const startY=(level.playerStart&&level.playerStart.y)||350;
        resetChicken(startX,startY);
        // Snap to ground
        let bestGroundY=468;
        for(const p of level.platforms){
          if(p.type==='moving')continue;
          if(ck.x+ck.w>p.x && ck.x<p.x+p.w && p.y>=startY && p.y<bestGroundY){
            bestGroundY=p.y;
          }
        }
        ck.y=bestGroundY-ck.h;
        ck.grounded=true;
        ck.invincible=60;
        screenShake=10;
      } else {
        lives--;
        screenShake=15;
        if(lives<=0){triggerGameOver();}
        else{gameState='dead';deathTimer=60;}
      }
    }
    return;
  }

  const f=ck;
  if(f.hurtTimer>0){f.hurtTimer--;if(f.hurtTimer<=0)f.state='idle';return;}

  let mx=0;if(isLeft())mx=-1;if(isRight())mx=1;
  if(mx!==0){f.vx+=mx*f.accel;f.facing=mx;f.state=f.grounded?'run':(f.vy<0?'jump':'fall');}
  else{f.vx*=f.friction;if(f.grounded)f.state='idle';}
  f.vx=Math.max(-f.maxSpeed,Math.min(f.maxSpeed,f.vx));

  if(f.grounded)f.coyoteTime=6;else f.coyoteTime=Math.max(0,f.coyoteTime-1);
  if(isJump()&&!f.jumpHeld)f.jumpBufferTime=8;else f.jumpBufferTime=Math.max(0,f.jumpBufferTime-1);

  if(f.jumpBufferTime>0&&f.coyoteTime>0){
    f.vy=f.jumpForce;f.jumpTime=f.maxJumpTime;f.grounded=false;f.coyoteTime=0;f.jumpBufferTime=0;f.state='jump';
    playSound('jump');playSound('cluck');
    spawnParticles(f.x+f.w/2,f.y+f.h,'#f0a500',4,3,12);
  }
  if(isJump()&&f.jumpTime>0){f.vy=Math.min(f.vy,f.jumpForce*0.7);f.jumpTime--;}else f.jumpTime=0;
  f.jumpHeld=isJump();

  f.vy+=f.gravity;f.vy=Math.min(f.vy,12);
  f.x+=f.vx;f.y+=f.vy;

  const res=resolveCollision(f,level.platforms);
  f.grounded=res.grounded;
  if(res.onPlatform&&res.onPlatform.type==='moving'){
    if(res.onPlatform._dx)f.x+=res.onPlatform._dx;
    if(res.onPlatform._dy)f.y+=res.onPlatform._dy;
  }
  if(!f.grounded&&f.vy>0)f.state='fall';

  if(isPickup()){
    if(!f.carrying){
      for(const obj of level.pickupObjects){
        if(!obj.active||obj.carried)continue;
        if(Math.abs(f.x+f.w/2-(obj.x+obj.w/2))<30&&Math.abs(f.y+f.h/2-(obj.y+obj.h/2))<30){
          f.carrying=obj;obj.carried=true;playSound('pickup');break;
        }
      }
      if(!f.carrying){
        for(const e of level.enemies){
          if(!e.alive||!e.stunned)continue;
          if(Math.abs(f.x+f.w/2-(e.x+e.w/2))<30&&Math.abs(f.y+f.h/2-(e.y+e.h/2))<30){
            f.carrying=e;e.carried=true;playSound('pickup');break;
          }
        }
      }
    }
  } else if(f.carrying){
    const obj=f.carrying;obj.carried=false;obj.x=f.x+f.facing*20;obj.y=f.y-10;obj.vx=f.facing*8;obj.vy=-4;obj.grounded=false;f.carrying=null;
    playSound('throw');spawnParticles(obj.x,obj.y,'#FFF5E6',5,3,10);
  }
  if(f.carrying){f.carrying.x=f.x+f.w/2-10;f.carrying.y=f.y-20;}

  if(f.invincible>0)f.invincible--;
  f.animTimer++;if(f.state==='run')f.animFrame+=0.3;f.wingFlap++;
  if(f.grounded&&Math.abs(f.vx)>2){f.runPT++;if(f.runPT%5===0)spawnParticles(f.x+f.w/2,f.y+f.h,'#c0a060',1,2,8);}

  if(f.x<0)f.x=0;if(f.x>level.width-f.w)f.x=level.width-f.w;
  if(f.y>H+50)chickenDie();
}

function chickenDie(){
  if(!fallDeathActive){
    fallDeathActive=true;
    fallDeathTimer=0;
    fallDeathParticles=[];
    fallDeathScreamPlayed=false;
    fallDeathX=ck.x-camera.x+ck.w/2;
    fallDeathY=H-40;
    ck.x=-100;
    ck.y=-100;
    ck.vx=0;
    ck.vy=0;
    screenShake=15;
  }
}

function hurtChicken(){
  if(ck.invincible>0||ck.hurtTimer>0||fallDeathActive)return;
  ck.hurtTimer=30;ck.invincible=90;ck.vy=-6;ck.vx=-ck.facing*3;ck.state='hurt';
  if(ck.carrying){ck.carrying.carried=false;ck.carrying.vx=ck.facing*3;ck.carrying.vy=-5;ck.carrying=null;}
  screenShake=10;playSound('hurt');spawnParticles(ck.x+ck.w/2,ck.y+ck.h/2,'#e74c3c',10,5,20);
  if(infiniteLives)return;
  lives--;if(lives<=0){triggerGameOver();}
}

function updateEnemies(){
  if(transitionTimer>0)return;
  for(const e of level.enemies){
    if(!e.alive||e.carried)continue;
    if(e.stunned){
      e.stunnedTimer--;
      if(e.stunnedTimer<=0){e.stunned=false;e.vx=(Math.random()>0.5?1:-1)*1.2;}
      if(e.vx!==0||(e.vy!==undefined&&e.vy!==0)){
        e.x+=(e.vx||0);
        if(e.vy!==undefined){e.vy+=0.4;e.y+=e.vy;}
        e.vx*=0.95;
        for(const o of level.enemies){
          if(o===e||!o.alive)continue;
          if(Math.abs(e.x-o.x)<20&&Math.abs(e.y-o.y)<20&&Math.abs(e.vx)>2){
            o.alive=false;score+=200;
            spawnParticles(o.x+o.w/2,o.y+o.h/2,'#e74c3c',12,6,25);
            spawnFloatingText(o.x,o.y-10,'+200','#f1c40f');
            playSound('stomp');
          }
        }
      }
      continue;
    }
    e.x+=e.vx;if(Math.abs(e.x-e.origX)>e.patrol)e.vx*=-1;
    if(ck.invincible<=0&&ck.hurtTimer<=0&&!fallDeathActive){
      if(rectCollide(ck,{x:e.x,y:e.y,w:e.w,h:e.h})){
        if(ck.vy>0&&ck.y+ck.h-e.y<15){
          e.stunned=true;e.stunnedTimer=300;e.vx=0;ck.vy=-8;score+=100;
          playSound('stomp');
          spawnParticles(e.x+e.w/2,e.y,'#f39c12',8,4,20);
          spawnFloatingText(e.x,e.y-10,'+100','#f1c40f');
          if(level.facts&&level.facts.length>0)spawnFloatingText(e.x,e.y-30,level.facts[Math.floor(Math.random()*level.facts.length)],'#74b9ff');
          screenShake=5;
        }
        else hurtChicken();
      }
    }
  }
}

function updatePickupObjects(){
  for(const p of level.pickupObjects){
    if(!p.active||p.carried)continue;
    if(p.vx!==0||!p.grounded){
      p.vy=(p.vy||0)+0.4;p.x+=p.vx;p.y+=p.vy;p.vx*=0.98;
      const res=resolveCollision(p,level.platforms);p.grounded=res.grounded;
      if(p.grounded){p.vy=0;p.vx*=0.8;if(Math.abs(p.vx)<0.1)p.vx=0;}
      if(Math.abs(p.vx)>2){
        for(const e of level.enemies){
          if(!e.alive)continue;
          if(Math.abs(p.x+p.w/2-(e.x+e.w/2))<20&&Math.abs(p.y+p.h/2-(e.y+e.h/2))<20){
            e.alive=false;score+=200;
            spawnParticles(e.x+e.w/2,e.y+e.h/2,'#e74c3c',12,6,25);
            spawnFloatingText(e.x,e.y-10,'+200','#f1c40f');
            playSound('stomp');p.vx*=0.5;
          }
        }
      }
      if(p.y>H+50)p.active=false;
    }
  }
}

function updateMovingPlatforms(){
  for(const p of level.platforms){
    if(p.type!=='moving')continue;
    const px=p.x,py=p.y;
    p.moveTimer+=0.02*(p.speed||1);
    if(p.moveX)p.x=p.origX+Math.sin(p.moveTimer)*p.moveX;
    if(p.moveY)p.y=p.origY+Math.sin(p.moveTimer)*p.moveY;
    p._dx=p.x-px;
    p._dy=p.y-py;
  }
}

function updateCoins(){
  if(transitionTimer>0||!ck.initialized)return;
  for(const c of level.coins){
    if(c.collected)continue;
    if(Math.abs(ck.x+ck.w/2-c.x)<18&&Math.abs(ck.y+ck.h/2-c.y)<18){
      c.collected=true;score+=10;playSound('coin');
      spawnParticles(c.x,c.y,'#f1c40f',6,4,15);
      spawnFloatingText(c.x,c.y-10,'+10','#f1c40f');
    }
  }
}

function updatePowerups(){
  if(transitionTimer>0||!ck.initialized)return;
  for(const p of level.powerups){
    if(p.collected)continue;
    if(Math.abs(ck.x+ck.w/2-p.x)<20&&Math.abs(ck.y+ck.h/2-p.y)<20){
      p.collected=true;
      if(p.type==='coffee_boost'){
        // Coffee boost: speed + jump boost AND extra life
        ck.maxSpeed=baseMaxSpeed+2;
        ck.jumpForce=-(baseJumpForce+1.5);
        if(coffeeBoostTimeout)clearTimeout(coffeeBoostTimeout);
        coffeeBoostTimeout=setTimeout(()=>{
          ck.maxSpeed=baseMaxSpeed;
          ck.jumpForce=-baseJumpForce;
          coffeeBoostTimeout=null;
        },8000);
        // Grant extra life
        lives++;
        spawnFloatingText(p.x,p.y-20,'☕ COFFEE BOOST!','#e67e22');
        spawnFloatingText(p.x,p.y-40,'🥚 +1 LIFE!','#2ecc71');
        playSound('extralife');
      } else {
        ck.invincible=300;
        spawnFloatingText(p.x,p.y-20,'📎 STAPLE SHIELD!','#3498db');
      }
      score+=50;playSound('powerup');
      spawnParticles(p.x,p.y,'#f39c12',15,6,25);
    }
  }
}

function checkGoal(){
  if(transitionTimer>0||!ck.initialized)return;
  if(rectCollide(ck,level.goal)){
    gameState='levelComplete';transitionTimer=180;
    playSound('levelcomplete');score+=500;
    spawnParticles(ck.x+ck.w/2,ck.y+ck.h/2,'#00b894',30,8,40);
    spawnGateMoney(40);
  }
}

function updateCamera(){
  if(!ck.initialized)return;
  const tx=ck.x-W/3,ty=ck.y-H/2;
  camera.x+=(tx-camera.x)*0.08;
  camera.y+=(ty-camera.y)*0.05;
  camera.x=Math.max(0,Math.min(level.width-W,camera.x));
  camera.y=Math.max(-100,Math.min(0,camera.y));
}

function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life--;
    if(p.life<=0)particles.splice(i,1);
  }
  for(let i=floatingTexts.length-1;i>=0;i--){
    const ft=floatingTexts[i];ft.y+=ft.vy;ft.life--;
    if(ft.life<=0)floatingTexts.splice(i,1);
  }
}

function updateGateMoney(){
  for(let i=gateMoneyParticles.length-1;i>=0;i--){
    const m=gateMoneyParticles[i];m.y+=m.vy;m.x+=m.vx;m.rot+=m.rotSpd;m.life--;
    if(m.life<=0)gateMoneyParticles.splice(i,1);
  }
}

function update(){
  time++;
  if(gameState==='playing'){
    if(transitionTimer>0)transitionTimer--;
    updateMovingPlatforms();updateChicken();updateEnemies();updatePickupObjects();updateCoins();updatePowerups();checkGoal();updateCamera();updateParticles();updateGateMoney();
    if(screenShake>0)screenShake--;
  } else if(gameState==='dead'){
    deathTimer--;updateParticles();
    if(deathTimer<=0){loadLevel(currentLevel);gameState='playing';}
  } else if(gameState==='levelComplete'){
    transitionTimer--;updateParticles();updateGateMoney();
    if(transitionTimer<=0){
      if(currentLevel<TOTAL_LEVELS-1){loadLevel(currentLevel+1);gameState='playing';}
      else gameState='win';
    }
  } else if(gameState==='gameOver'){
    updateParticles();
    if(gameOverFactTimer>0)gameOverFactTimer--;
  }

  document.getElementById('score-display').textContent=`Score: ${score}`;
  document.getElementById('level-display').textContent=`Level ${currentLevel+1}/${TOTAL_LEVELS}${level?' - '+level.name:''}`;
  const livesText=infiniteLives?'Lives: ♾️':`Lives: ${'🥚'.repeat(Math.max(0,lives))}`;
  document.getElementById('lives-display').textContent=livesText;
}

function drawMoneyBill(x,y,rot,size,alpha){
  ctx.save();ctx.translate(x,y);ctx.rotate(rot);ctx.globalAlpha=alpha;
  ctx.fillStyle='#2a8a2a';ctx.fillRect(-size/2,-size/3,size,size*0.66);
  ctx.fillStyle='#3aaa3a';ctx.fillRect(-size/2+1,-size/3+1,size-2,size*0.66-2);
  ctx.fillStyle='#2a8a2a';ctx.font=`bold ${size*0.35}px Arial`;ctx.textAlign='center';ctx.fillText('$',0,size*0.1);
  ctx.globalAlpha=1;ctx.restore();
}

function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');
  let line='';
  let currentY=y;
  for(const word of words){
    const testLine=line+(line?' ':'')+word;
    if(ctx.measureText(testLine).width>maxWidth&&line){
      ctx.fillText(line,x,currentY);
      currentY+=lineHeight;
      line=word;
    } else {
      line=testLine;
    }
  }
  ctx.fillText(line,x,currentY);
}

function drawChicken(x,y,facing,state,animFrame,invincible,wingFlap,carrying){
  if(invincible>0&&Math.floor(invincible/3)%2===0)return;
  ctx.save();
  ctx.translate(x+16,y+18);
  ctx.scale(facing,1);

  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath();ctx.ellipse(0,22,14,4,0,0,Math.PI*2);ctx.fill();

  const wF=Math.sin(wingFlap*0.3)*(state==='jump'||state==='fall'?10:3);
  ctx.fillStyle='#D48A00';
  ctx.beginPath();ctx.ellipse(-17,2+wF*0.5,6,9,-0.2+wF*0.03,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(17,2+wF*0.5,6,9,0.2-wF*0.03,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,200,50,0.3)';
  ctx.beginPath();ctx.ellipse(-17,0+wF*0.5,3,5,-0.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(17,0+wF*0.5,3,5,0.2,0,Math.PI*2);ctx.fill();

  ctx.save();ctx.rotate(Math.PI/4);
  ctx.fillStyle='#C08000';const bs=16;
  ctx.beginPath();ctx.roundRect(-bs-1,-bs-1,bs*2+2,bs*2+2,4);ctx.fill();
  ctx.fillStyle='#F0A500';ctx.beginPath();ctx.roundRect(-bs,-bs,bs*2,bs*2,4);ctx.fill();
  ctx.fillStyle='rgba(200,150,30,0.4)';
  [[-8,-8],[8,-8],[-8,8],[8,8],[0,0],[-8,0],[8,0],[0,-8],[0,8]].forEach(([sx,sy])=>{
    ctx.beginPath();ctx.arc(sx,sy,3.8,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(180,130,20,0.3)';ctx.lineWidth=0.5;ctx.stroke();
  });
  ctx.restore();

  ctx.fillStyle='#FF6B8A';
  ctx.beginPath();ctx.moveTo(-3,-23);ctx.lineTo(0,-30);ctx.lineTo(3,-23);ctx.fill();
  ctx.fillStyle='#222';ctx.beginPath();ctx.moveTo(-1.5,-28);ctx.lineTo(0,-33);ctx.lineTo(1.5,-28);ctx.fill();

  const eyeY=state==='hurt'?-6:-7;
  ctx.fillStyle='#ddd';ctx.beginPath();ctx.arc(-7,eyeY+0.5,6.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(7,eyeY+0.5,6.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-7,eyeY,6,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(7,eyeY,6,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#333';ctx.lineWidth=1.2;ctx.beginPath();ctx.arc(-7,eyeY,6,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.arc(7,eyeY,6,0,Math.PI*2);ctx.stroke();

  if(state==='hurt'){
    ctx.strokeStyle='#c00';ctx.lineWidth=2.5;
    [-7,7].forEach(ex=>{
      ctx.beginPath();ctx.moveTo(ex-3,eyeY-3);ctx.lineTo(ex+3,eyeY+3);ctx.stroke();
      ctx.beginPath();ctx.moveTo(ex+3,eyeY-3);ctx.lineTo(ex-3,eyeY+3);ctx.stroke();
    });
  } else {
    const lk=facing*1.5;
    ctx.fillStyle='#111';ctx.beginPath();ctx.arc(-7+lk,eyeY,3.8,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(7+lk,eyeY,3.8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-6+lk,eyeY-1.5,1.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(8+lk,eyeY-1.5,1.5,0,Math.PI*2);ctx.fill();
  }

  ctx.fillStyle='#FF8FA0';ctx.save();ctx.translate(0,4);ctx.rotate(Math.PI/4);
  ctx.beginPath();ctx.roundRect(-5,-5,10,10,1.5);ctx.fill();
  ctx.fillStyle='rgba(200,100,120,0.4)';ctx.beginPath();ctx.arc(0,0,2.5,0,Math.PI*2);ctx.fill();
  ctx.restore();

  const legA=state==='run'?Math.sin(animFrame*0.5)*5:0;
  ctx.strokeStyle='#222';ctx.lineWidth=2.8;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-6,18);ctx.lineTo(-6,27+legA);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-10,29+legA);ctx.lineTo(-6,27+legA);ctx.lineTo(-2,29+legA);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-6,27+legA);ctx.lineTo(-6,30+legA);ctx.stroke();
  ctx.beginPath();ctx.moveTo(6,18);ctx.lineTo(6,27-legA);ctx.stroke();
  ctx.beginPath();ctx.moveTo(2,29-legA);ctx.lineTo(6,27-legA);ctx.lineTo(10,29-legA);ctx.stroke();
  ctx.beginPath();ctx.moveTo(6,27-legA);ctx.lineTo(6,30-legA);ctx.stroke();

  if(carrying){drawEggSprite(0,-34,12);}
  ctx.restore();
}

function drawEggSprite(x,y,size){
  ctx.fillStyle='#FFF5E6';ctx.beginPath();ctx.ellipse(x,y,size*0.55,size*0.7,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,240,220,0.6)';ctx.beginPath();ctx.ellipse(x-size*0.15,y-size*0.2,size*0.2,size*0.3,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(180,160,130,0.4)';ctx.lineWidth=0.8;ctx.beginPath();ctx.ellipse(x,y,size*0.55,size*0.7,0,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='rgba(180,160,130,0.3)';
  for(let i=0;i<4;i++){const sx=x+(Math.sin(i*2.3)*size*0.3);const sy=y+(Math.cos(i*1.7)*size*0.4);ctx.beginPath();ctx.arc(sx,sy,1,0,Math.PI*2);ctx.fill();}
}

function drawPlatform(p){
  const x=p.x-camera.x,y=p.y-camera.y;
  if(x+p.w<-10||x>W+10)return;
  ctx.save();
  switch(p.type){
    case'ground_
